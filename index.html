    // ─── ADMIN PANEL ───────────────────────────────────────────────────────
    function AdminPanel({ currentUser, onClose }) {
      const [accounts, setAccounts] = useState(getAccounts());
      const [newUsername, setNewUsername] = useState("");
      const [newPin, setNewPin] = useState("");
      const [message, setMessage] = useState("");

      const refresh = () => setAccounts(getAccounts());

      const createAccount = () => {
        if (!newUsername.trim() || !newPin.trim()) {
          setMessage("Username and PIN required"); return;
        }
        if (newPin.length < 4) {
          setMessage("PIN must be at least 4 digits"); return;
        }
        const existing = accounts.find(a => a.username.toLowerCase() === newUsername.toLowerCase());
        if (existing) {
          setMessage("Username already exists"); return;
        }
        const updated = [...accounts, { username: newUsername.trim(), pin: newPin, isAdmin: false, createdAt: new Date().toISOString() }];
        saveAccounts(updated);
        setNewUsername(""); setNewPin("");
        setMessage("Account created!");
        refresh();
        setTimeout(() => setMessage(""), 2000);
      };

      const deleteAccount = (username) => {
        if (username === currentUser.username) return;
        const updated = accounts.filter(a => a.username !== username);
        saveAccounts(updated);
        // Also remove their data
        localStorage.removeItem("hypertrophy_user_" + username);
        refresh();
      };

      const toggleAdmin = (username) => {
        if (username === currentUser.username) return;
        const updated = accounts.map(a => a.username === username ? { ...a, isAdmin: !a.isAdmin } : a);
        saveAccounts(updated);
        refresh();
      };

      const resetPin = (username) => {
        const newPinVal = prompt("Enter new PIN for " + username + ":");
        if (newPinVal && newPinVal.length >= 4 && /^\d+$/.test(newPinVal)) {
          const updated = accounts.map(a => a.username === username ? { ...a, pin: newPinVal } : a);
          saveAccounts(updated);
          refresh();
        }
      };

      return (
        <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.85)", zIndex: 300, overflow: "auto", padding: 16 }}>
          <div style={{ maxWidth: 500, margin: "0 auto", paddingTop: 20, paddingBottom: 40 }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 24 }}>
              <div style={{ fontSize: 20, fontWeight: 700, color: "#fff" }}>Admin Panel</div>
              <button onClick={onClose} style={{ background: "none", border: "none", color: "#888", fontSize: 24, cursor: "pointer", padding: 8 }}>×</button>
            </div>

            <Card>
              <div style={{ fontSize: 14, fontWeight: 600, color: "#fff", marginBottom: 16 }}>Create New Account</div>
              <div style={{ display: "flex", gap: 8, marginBottom: 8 }}>
                <input
                  type="text" value={newUsername}
                  onChange={(e) => setNewUsername(e.target.value)}
                  placeholder="Username"
                  style={{
                    flex: 1, background: "#0f0f0f", color: "#fff", border: "1px solid #333",
                    padding: "10px", borderRadius: 6, fontSize: 14,
                  }}
                />
                <input
                  type="text" value={newPin} inputMode="numeric" maxLength={6}
                  onChange={(e) => setNewPin(e.target.value.replace(/\D/g, ""))}
                  placeholder="PIN"
                  style={{
                    width: 80, background: "#0f0f0f", color: "#fff", border: "1px solid #333",
                    padding: "10px", borderRadius: 6, fontSize: 14, letterSpacing: "0.2em",
                  }}
                />
              </div>
              <button
                onClick={createAccount}
                style={{
                  width: "100%", padding: "10px", background: "#10b981", border: "none",
                  borderRadius: 6, color: "#fff", fontSize: 14, fontWeight: 600, cursor: "pointer",
                  minHeight: 40, touchAction: "manipulation",
                }}
              >
                <Icon name="plus" size={14} color="#fff" /> Create Account
              </button>
              {message && <div style={{ marginTop: 8, fontSize: 12, color: message.includes("!") ? "#10b981" : "#ef4444", textAlign: "center" }}>{message}</div>}
            </Card>

            <Card>
              <div style={{ fontSize: 14, fontWeight: 600, color: "#fff", marginBottom: 16 }}>Accounts ({accounts.length})</div>
              {accounts.map(acc => (
                <div key={acc.username} style={{
                  display: "flex", justifyContent: "space-between", alignItems: "center",
                  padding: "10px 0", borderBottom: "1px solid #222",
                }}>
                  <div>
                    <div style={{ fontSize: 14, color: "#fff", fontWeight: 500 }}>
                      {acc.username}
                      {acc.isAdmin && <span style={{ fontSize: 10, color: "#f59e0b", marginLeft: 8, background: "#2a2000", padding: "2px 6px", borderRadius: 4 }}>ADMIN</span>}
                      {acc.username === currentUser.username && <span style={{ fontSize: 10, color: "#10b981", marginLeft: 8 }}>(you)</span>}
                    </div>
                    <div style={{ fontSize: 11, color: "#666", marginTop: 2 }}>
                      PIN: {acc.pin} • Created {new Date(acc.createdAt).toLocaleDateString()}
                    </div>
                  </div>
                  {acc.username !== currentUser.username && (
                    <div style={{ display: "flex", gap: 6 }}>
                      <button
                        onClick={() => toggleAdmin(acc.username)}
                        title={acc.isAdmin ? "Remove admin" : "Make admin"}
                        style={{
                          background: "#222", border: "none", color: acc.isAdmin ? "#f59e0b" : "#888",
                          padding: "6px 8px", borderRadius: 4, fontSize: 10, cursor: "pointer",
                          minHeight: 32, touchAction: "manipulation",
                        }}
                      >
                        {acc.isAdmin ? "Demote" : "Admin"}
                      </button>
                      <button
                        onClick={() => resetPin(acc.username)}
                        style={{
                          background: "#222", border: "none", color: "#888",
                          padding: "6px 8px", borderRadius: 4, fontSize: 10, cursor: "pointer",
                          minHeight: 32, touchAction: "manipulation",
                        }}
                      >
                        Reset PIN
                      </button>
                      <button
                        onClick={() => deleteAccount(acc.username)}
                        style={{
                          background: "#2a0000", border: "none", color: "#ef4444",
                          padding: "6px 8px", borderRadius: 4, fontSize: 10, cursor: "pointer",
                          minHeight: 32, touchAction: "manipulation",
                        }}
                      >
                        Delete
                      </button>
                    </div>
                  )}
                </div>
              ))}
            </Card>
          </div>
        </div>
      );
    }

    // ─── MAIN APP COMPONENT ─────────────────────────────────────────────────
    function HypertrophyApp() {
      // Auth state
      const [currentUser, setCurrentUser] = useState(() => {
        const savedSession = localStorage.getItem(ACTIVE_SESSION_KEY);
        if (savedSession) {
          const accounts = getAccounts();
          return accounts.find(a => a.username === savedSession) || null;
        }
        return null;
      });
      const [showAdmin, setShowAdmin] = useState(false);

      // Load user data from localStorage
      const loadUserState = (username) => {
        const data = getUserData(username);
        return {
          workoutLog: data.workoutLog || [],
          activeProgram: data.activeProgram || null,
          mesocycle: data.mesocycle || null,
          equipmentFilter: data.equipmentFilter || "full",
          customPrograms: data.customPrograms || [],
        };
      };

      const initialState = currentUser ? loadUserState(currentUser.username) : { workoutLog: [], activeProgram: null, mesocycle: null, equipmentFilter: "full", customPrograms: [] };

      const [activeTab, setActiveTab] = useState("dashboard");
      const [workoutLog, setWorkoutLog] = useState(initialState.workoutLog);
      const [activeProgram, setActiveProgram] = useState(initialState.activeProgram);
      const [mesocycle, setMesocycle] = useState(initialState.mesocycle);
      const [currentWorkout, setCurrentWorkout] = useState(null);
      const [equipmentFilter, setEquipmentFilter] = useState(initialState.equipmentFilter);
      const [customPrograms, setCustomPrograms] = useState(initialState.customPrograms);

      // Auto-save to localStorage whenever state changes
      useEffect(() => {
        if (!currentUser) return;
        saveUserData(currentUser.username, { workoutLog, activeProgram, mesocycle, equipmentFilter, customPrograms });
      }, [workoutLog, activeProgram, mesocycle, equipmentFilter, customPrograms, currentUser]);

      const handleLogin = (account) => {
        setCurrentUser(account);
        const data = loadUserState(account.username);
        setWorkoutLog(data.workoutLog);
        setActiveProgram(data.activeProgram);
        setMesocycle(data.mesocycle);
        setEquipmentFilter(data.equipmentFilter);
        setCustomPrograms(data.customPrograms);
        setCurrentWorkout(null);
        setActiveTab("dashboard");
      };

      const handleLogout = () => {
        localStorage.removeItem(ACTIVE_SESSION_KEY);
        setCurrentUser(null);
        setWorkoutLog([]);
        setActiveProgram(null);
        setMesocycle(null);
        setCurrentWorkout(null);
        setEquipmentFilter("full");
        setCustomPrograms([]);
      };

      if (!currentUser) {
        return <LoginScreen onLogin={handleLogin} />;
      }

      const weeklyVolume = useMemo(() => {
        const thisWeek = getWeekStart(getToday());
        const vol = {};
        Object.keys(VOLUME_LANDMARKS).forEach(m => vol[m] = 0);
        workoutLog.filter(w => getWeekStart(w.date) === thisWeek).forEach(w => {
          w.exercises.forEach(ex => {
            if (ex.muscle && vol[ex.muscle] !== undefined) {
              vol[ex.muscle] += ex.sets.filter(s => s.done).length;
            }
          });
        });
        return vol;
      }, [workoutLog]);

      const fatigueData = useMemo(() => analyzeFatigue(workoutLog), [workoutLog]);
      const allProgramsCombined = useMemo(() => [...PROGRAMS, ...(customPrograms || [])], [customPrograms]);
      const mesoSetTargets = useMemo(() => calculateMesoSetTargets(mesocycle, activeProgram, allProgramsCombined), [mesocycle, activeProgram, allProgramsCombined]);

      const tabs = [
        { id: "dashboard", label: "Dashboard", icon: "flame" },
        { id: "workout", label: "Train", icon: "dumbbell" },
        { id: "programs", label: "Programs", icon: "target" },
        { id: "volume", label: "Volume", icon: "trending-up" },
        { id: "mesocycle", label: "Meso", icon: "calendar" },
        { id: "history", label: "History", icon: "clock" },
      ];

      return (
        <div style={{ minHeight: "100vh", background: "#0a0a0a", color: "#e5e5e5" }}>
          <div style={{ background: "linear-gradient(135deg, #111 0%, #1a1a1a 100%)", borderBottom: "1px solid #222", padding: "12px 16px", display: "flex", alignItems: "center", gap: 10 }}>
            <img src="logo.png" alt="BENT" style={{ width: 36, height: 36, borderRadius: 10, objectFit: "cover", flexShrink: 0 }}
              onError={(e) => { e.target.onerror = null; e.target.style.display = "none"; }}
            />
            <div style={{ flex: 1, minWidth: 0 }}>
              <div style={{ fontSize: 18, fontWeight: 900, color: "#fff", letterSpacing: "-0.02em" }}>BENT</div>
              <div style={{ fontSize: 10, color: "#22c55e" }}>{currentUser.username}{currentUser.isAdmin && " · Admin"}</div>
            </div>
            <div style={{ display: "flex", gap: 6, flexShrink: 0 }}>
              {currentUser.isAdmin && (
                <button
                  onClick={() => setShowAdmin(true)}
                  style={{
                    background: "#1a1a2e", border: "none", color: "#818cf8", padding: "6px 10px",
                    borderRadius: 6, fontSize: 11, fontWeight: 600, cursor: "pointer",
                    minHeight: 32, touchAction: "manipulation",
                  }}
                >
                  <Icon name="settings" size={14} color="#818cf8" />
                </button>
              )}
              <button
                onClick={handleLogout}
                style={{
                  background: "#1a0a0a", border: "none", color: "#ef4444", padding: "6px 10px",
                  borderRadius: 6, fontSize: 11, fontWeight: 600, cursor: "pointer",
                  minHeight: 32, touchAction: "manipulation",
                }}
              >
                Logout
              </button>
            </div>
          </div>

          <div style={{ maxWidth: 600, margin: "0 auto", padding: "0 12px 80px" }}>
            {activeTab === "dashboard" && (
              <DashboardView
                workoutLog={workoutLog} weeklyVolume={weeklyVolume} activeProgram={activeProgram}
                mesocycle={mesocycle} fatigueData={fatigueData} mesoSetTargets={mesoSetTargets}
                onStartWorkout={() => setActiveTab("workout")}
              />
            )}
            {activeTab === "workout" && (
              <WorkoutView
                workoutLog={workoutLog} setWorkoutLog={setWorkoutLog} activeProgram={activeProgram}
                currentWorkout={currentWorkout} setCurrentWorkout={setCurrentWorkout} mesocycle={mesocycle}
                setMesocycle={setMesocycle} equipmentFilter={equipmentFilter}
                customPrograms={customPrograms}
              />
            )}
            {activeTab === "programs" && (
              <ProgramsView
                activeProgram={activeProgram} setActiveProgram={setActiveProgram}
                setMesocycle={setMesocycle} equipmentFilter={equipmentFilter}
                setEquipmentFilter={setEquipmentFilter}
                setActiveTab={setActiveTab}
                setCurrentWorkout={setCurrentWorkout}
                customPrograms={customPrograms} setCustomPrograms={setCustomPrograms}
              />
            )}
            {activeTab === "volume" && (
              <VolumeView weeklyVolume={weeklyVolume} workoutLog={workoutLog} fatigueData={fatigueData} mesoSetTargets={mesoSetTargets} />
            )}
            {activeTab === "mesocycle" && (
              <MesocycleView
                mesocycle={mesocycle} setMesocycle={setMesocycle} workoutLog={workoutLog}
                activeProgram={activeProgram} fatigueData={fatigueData} mesoSetTargets={mesoSetTargets}
              />
            )}
            {activeTab === "history" && (
              <HistoryView workoutLog={workoutLog} setWorkoutLog={setWorkoutLog} />
            )}
          </div>

          <div style={{ position: "fixed", bottom: 0, left: 0, right: 0, background: "#111", borderTop: "1px solid #222", display: "flex", justifyContent: "center", padding: "6px 0 env(safe-area-inset-bottom, 8px)", zIndex: 100 }}>
            <div style={{ display: "flex", maxWidth: 600, width: "100%", touchAction: "manipulation" }}>
              {tabs.map(tab => (
                <button
                  key={tab.id}
                  onClick={() => setActiveTab(tab.id)}
                  style={{
                    flex: 1, display: "flex", flexDirection: "column", alignItems: "center", gap: 2,
                    padding: "8px 0", background: "none", border: "none", cursor: "pointer",
                    color: activeTab === tab.id ? "#22c55e" : "#555",
                    fontSize: 10, fontWeight: activeTab === tab.id ? 600 : 400,
                    transition: "color 0.2s", minHeight: 44, justifyContent: "center",
                    touchAction: "manipulation",
                  }}
                >
                  <Icon name={tab.icon} size={18} />
                  {tab.label}
                </button>
              ))}
            </div>
          </div>

          {showAdmin && <AdminPanel currentUser={currentUser} onClose={() => setShowAdmin(false)} />}
        </div>
      );
    }

    // ─── DASHBOARD VIEW ─────────────────────────────────────────────────────
    function DashboardView({ workoutLog, weeklyVolume, activeProgram, mesocycle, fatigueData, mesoSetTargets, onStartWorkout }) {
      const today = getToday();
      const thisWeek = getWeekStart(today);
      const workoutsThisWeek = workoutLog.filter(w => getWeekStart(w.date) === thisWeek).length;

      const overloadAlerts = useMemo(() => {
        const alerts = [];
        const exerciseHistory = {};
        workoutLog.slice().reverse().forEach(w => {
          w.exercises.forEach(ex => {
            if (!exerciseHistory[ex.name]) exerciseHistory[ex.name] = [];
            const completedSets = ex.sets.filter(s => s.done);
            if (completedSets.length > 0) {
              exerciseHistory[ex.name].push({
                date: w.date, maxWeight: Math.max(...completedSets.map(s => s.weight || 0)),
                totalVolume: completedSets.reduce((sum, s) => sum + (s.weight || 0) * (s.reps || 0), 0),
                avgReps: completedSets.reduce((sum, s) => sum + (s.reps || 0), 0) / completedSets.length,
              });
            }
          });
        });
        Object.entries(exerciseHistory).forEach(([name, history]) => {
          if (history.length >= 3) {
            const last3 = history.slice(0, 3);
            const allSameWeight = last3.every(h => h.maxWeight === last3[0].maxWeight);
            const repsIncreasing = last3[0].avgReps > last3[2].avgReps;
            if (allSameWeight && repsIncreasing) {
              alerts.push({ exercise: name, weight: last3[0].maxWeight, message: `Ready to increase on ${name}!` });
            }
          }
        });
        return alerts.slice(0, 3);
      }, [workoutLog]);

      const volumeAlerts = useMemo(() => {
        const alerts = [];
        Object.entries(weeklyVolume).forEach(([muscle, sets]) => {
          const lm = VOLUME_LANDMARKS[muscle];
          if (sets >= lm.mrv) {
            alerts.push({ muscle, type: "over", message: `${muscle} at MRV. Consider a deload.` });
          } else if (sets < lm.mv && workoutsThisWeek >= 3) {
            alerts.push({ muscle, type: "under", message: `${muscle} below MV. Add more sets.` });
          }
        });
        return alerts.slice(0, 3);
      }, [weeklyVolume, workoutsThisWeek]);

      const autoAdjustments = useMemo(() => computeAutoAdjustments(workoutLog, {}), [workoutLog]);

      return (
        <div style={{ paddingTop: 16 }}>
          <div style={{ fontSize: 18, fontWeight: 700, color: "#fff", marginBottom: 16 }}>Dashboard</div>

          <Card>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
              <div>
                <div style={{ fontSize: 12, color: "#888", textTransform: "uppercase" }}>This Week</div>
                <div style={{ fontSize: 24, fontWeight: 700, color: "#fff" }}>{workoutsThisWeek}</div>
              </div>
              <button
                onClick={onStartWorkout}
                style={{
                  background: "linear-gradient(135deg, #22c55e, #16a34a)", color: "#fff", border: "none",
                  padding: "10px 20px", borderRadius: 8, fontSize: 14, fontWeight: 600, cursor: "pointer",
                  minHeight: 44, display: "flex", alignItems: "center", gap: 6, touchAction: "manipulation",
                }}
              >
                <Icon name="play" size={16} color="#fff" />
                Start
              </button>
            </div>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8 }}>
              {Object.entries(weeklyVolume).slice(0, 6).map(([muscle, sets]) => {
                const lm = VOLUME_LANDMARKS[muscle];
                const target = mesoSetTargets[muscle]?.[mesocycle?.currentWeek || 1] || lm.mav;
                return (
                  <div key={muscle} style={{ fontSize: 11 }}>
                    <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 4 }}>
                      <span style={{ textTransform: "capitalize", color: "#ccc" }}>{muscle}</span>
                      <span style={{ color: "#888" }}>{sets}/{target}</span>
                    </div>
                    <div style={{ background: "#0f0f0f", height: 4, borderRadius: 2, overflow: "hidden" }}>
                      <div
                        style={{
                          height: "100%", background: MUSCLE_COLORS[muscle],
                          width: `${Math.min((sets / target) * 100, 100)}%`,
                        }}
                      />
                    </div>
                  </div>
                );
              })}
            </div>
          </Card>

          <Card>
            <div style={{ fontSize: 14, fontWeight: 600, color: "#fff", marginBottom: 12 }}>Fatigue Status</div>
            <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 12 }}>
              <div style={{ width: 60, height: 60, borderRadius: "50%", background: `rgba(${fatigueData.overall > 70 ? "239, 68, 68" : fatigueData.overall > 50 ? "245, 158, 11" : "16, 185, 129"}, 0.2)`, display: "flex", alignItems: "center", justifyContent: "center" }}>
                <div style={{ fontSize: 22, fontWeight: 700, color: fatigueData.overall > 70 ? "#ef4444" : fatigueData.overall > 50 ? "#f59e0b" : "#10b981" }}>
                  {fatigueData.overall}
                </div>
              </div>
              <div>
                <div style={{ fontSize: 14, fontWeight: 600, color: "#fff" }}>{fatigueData.overallLabel}</div>
                <div style={{ fontSize: 12, color: "#888", marginTop: 4 }}>{fatigueData.recommendation}</div>
              </div>
            </div>
          </Card>

          {overloadAlerts.length > 0 && (
            <Card>
              <div style={{ fontSize: 14, fontWeight: 600, color: "#10b981", marginBottom: 8 }}>Progressive Overload</div>
              {overloadAlerts.map((alert, i) => (
                <div key={i} style={{ fontSize: 12, color: "#ccc", marginBottom: 6, paddingLeft: 8, borderLeft: "2px solid #10b981" }}>
                  {alert.message}
                </div>
              ))}
            </Card>
          )}

          {volumeAlerts.length > 0 && (
            <Card>
              <div style={{ fontSize: 14, fontWeight: 600, color: "#f59e0b", marginBottom: 8 }}>Volume Alerts</div>
              {volumeAlerts.map((alert, i) => (
                <div key={i} style={{ fontSize: 12, color: "#ccc", marginBottom: 6, paddingLeft: 8, borderLeft: `2px solid ${alert.type === "over" ? "#ef4444" : "#f59e0b"}` }}>
                  {alert.message}
                </div>
              ))}
            </Card>
          )}
        </div>
      );
    }

    // ─── WORKOUT VIEW ───────────────────────────────────────────────────────
    function WorkoutView({ workoutLog, setWorkoutLog, activeProgram, currentWorkout, setCurrentWorkout, mesocycle, setMesocycle, equipmentFilter, customPrograms }) {
      const allPrograms = [...PROGRAMS, ...(customPrograms || [])];
      const [restTimer, setRestTimer] = useState(null);
      const [restTime, setRestTime] = useState(0);
      const [showExercisePicker, setShowExercisePicker] = useState(false);
      const [selectedMuscle, setSelectedMuscle] = useState(null);
      const [timerInterval, setTimerIntervalState] = useState(null);
      const [completedExerciseIdx, setCompletedExerciseIdx] = useState(null);

      useEffect(() => {
        return () => { if (timerInterval) clearInterval(timerInterval); };
      }, [timerInterval]);

      const startRest = (seconds = 120) => {
        if (timerInterval) clearInterval(timerInterval);
        setRestTime(seconds);
        const id = setInterval(() => {
          setRestTime(prev => {
            if (prev <= 1) { clearInterval(id); return 0; }
            return prev - 1;
          });
        }, 1000);
        setTimerIntervalState(id);
        setRestTimer(true);
      };

      const startWorkout = (dayName, exercises) => {
        const filteredExercises = filterExercisesByEquipment(exercises, equipmentFilter);
        const currentWeek = mesocycle?.currentWeek || 1;
        const isDeloadWeek = mesocycle?.deloadWeeks?.includes(currentWeek);
        setCurrentWorkout({
          id: generateId(), date: getToday(), dayName, startTime: Date.now(),
          exercises: filteredExercises.map(ex => ({
            name: ex.exercise, muscle: ex.muscle, targetSets: ex.sets, targetReps: ex.reps,
            sets: Array.from({ length: ex.sets }, () => ({
              weight: 0, reps: 0, done: false,
              targetRir: getTargetRIR(currentWeek, isDeloadWeek),
              actualRir: 0
            })),
            feedback: null,
          })),
        });
      };

      const finishWorkout = () => {
        if (!currentWorkout) return;
        const duration = Math.round((Date.now() - currentWorkout.startTime) / 60000);
        setWorkoutLog(prev => [...prev, { ...currentWorkout, duration }]);
        if (mesocycle) {
          const workoutsThisWeek = workoutLog.filter(w => getWeekStart(w.date) === getWeekStart(getToday())).length + 1;
          const prog = allPrograms.find(p => p.id === activeProgram);
          if (prog && workoutsThisWeek >= prog.daysPerWeek) {
            setMesocycle(prev => prev ? { ...prev, currentWeek: Math.min(prev.currentWeek + 1, prev.totalWeeks) } : prev);
          }
        }
        setCurrentWorkout(null);
        if (timerInterval) clearInterval(timerInterval);
        setRestTimer(null);
      };

      const addExercise = (exerciseName, muscle) => {
        if (!currentWorkout) return;
        const currentWeek = mesocycle?.currentWeek || 1;
        const isDeloadWeek = mesocycle?.deloadWeeks?.includes(currentWeek);
        setCurrentWorkout(prev => ({
          ...prev,
          exercises: [...prev.exercises, {
            name: exerciseName, muscle, targetSets: 3, targetReps: "8-12",
            sets: Array.from({ length: 3 }, () => ({
              weight: 0, reps: 0, done: false,
              targetRir: getTargetRIR(currentWeek, isDeloadWeek),
              actualRir: 0
            })),
            feedback: null,
          }],
        }));
        setShowExercisePicker(false);
        setSelectedMuscle(null);
      };

      const updateSet = (exIdx, setIdx, field, value) => {
        setCurrentWorkout(prev => {
          const next = { ...prev, exercises: [...prev.exercises] };
          next.exercises[exIdx] = { ...next.exercises[exIdx], sets: [...next.exercises[exIdx].sets] };
          next.exercises[exIdx].sets[setIdx] = { ...next.exercises[exIdx].sets[setIdx], [field]: value };
          return next;
        });
      };

      const toggleSetDone = (exIdx, setIdx) => {
        updateSet(exIdx, setIdx, "done", !currentWorkout.exercises[exIdx].sets[setIdx].done);
        if (!currentWorkout.exercises[exIdx].sets[setIdx].done) {
          startRest(currentWorkout.exercises[exIdx].sets[setIdx].weight > 100 ? 180 : 120);
        }
      };

      const addSet = (exIdx) => {
        setCurrentWorkout(prev => {
          const next = { ...prev, exercises: [...prev.exercises] };
          const currentWeek = mesocycle?.currentWeek || 1;
          const isDeloadWeek = mesocycle?.deloadWeeks?.includes(currentWeek);
          next.exercises[exIdx] = {
            ...next.exercises[exIdx],
            sets: [...next.exercises[exIdx].sets, {
              weight: 0, reps: 0, done: false,
              targetRir: getTargetRIR(currentWeek, isDeloadWeek),
              actualRir: 0
            }]
          };
          return next;
        });
      };

      const removeSet = (exIdx) => {
        setCurrentWorkout(prev => {
          const next = { ...prev, exercises: [...prev.exercises] };
          if (next.exercises[exIdx].sets.length > 1) {
            next.exercises[exIdx] = { ...next.exercises[exIdx], sets: next.exercises[exIdx].sets.slice(0, -1) };
          }
          return next;
        });
      };

      const removeExercise = (exIdx) => {
        setCurrentWorkout(prev => ({
          ...prev, exercises: prev.exercises.filter((_, i) => i !== exIdx),
        }));
      };

      const setExerciseFeedback = (exIdx, feedback) => {
        setCurrentWorkout(prev => {
          const next = { ...prev, exercises: [...prev.exercises] };
          next.exercises[exIdx] = { ...next.exercises[exIdx], feedback };
          return next;
        });
        setCompletedExerciseIdx(null);
      };

      const getPrevPerformance = (exerciseName) => {
        for (let i = workoutLog.length - 1; i >= 0; i--) {
          const ex = workoutLog[i].exercises.find(e => e.name === exerciseName);
          if (ex) {
            const doneSets = ex.sets.filter(s => s.done);
            if (doneSets.length > 0) return doneSets;
          }
        }
        return null;
      };

      if (!currentWorkout) {
        return (
          <div style={{ paddingTop: 16 }}>
            <div style={{ fontSize: 18, fontWeight: 700, color: "#fff", marginBottom: 16 }}>Start Workout</div>
            {activeProgram ? (
              <div>
                {allPrograms.find(p => p.id === activeProgram)?.split.map((dayName, i) => (
                  <Card key={i} style={{ cursor: "pointer" }} onClick={() => {
                    const prog = allPrograms.find(p => p.id === activeProgram);
                    startWorkout(dayName, prog.days[dayName]);
                  }}>
                    <div style={{ fontSize: 16, fontWeight: 600, color: "#fff" }}>{dayName}</div>
                    <div style={{ fontSize: 12, color: "#888", marginTop: 4 }}>
                      {allPrograms.find(p => p.id === activeProgram)?.days[dayName]?.length || 0} exercises
                    </div>
                  </Card>
                ))}
              </div>
            ) : (
              <Card>
                <div style={{ fontSize: 14, color: "#888" }}>Select a program first in Programs tab</div>
              </Card>
            )}
          </div>
        );
      }

      return (
        <div style={{ paddingTop: 16 }}>
          {restTimer && (
            <div style={{ background: "#ef4444", padding: "12px 16px", marginBottom: 12, borderRadius: 8, color: "#fff", fontWeight: 600, fontSize: 16, textAlign: "center" }}>
              Rest: {Math.floor(restTime / 60)}:{String(restTime % 60).padStart(2, "0")}
            </div>
          )}

          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
            <div>
              <div style={{ fontSize: 12, color: "#888", textTransform: "uppercase" }}>Workout</div>
              <div style={{ fontSize: 18, fontWeight: 700, color: "#fff" }}>{currentWorkout.dayName}</div>
            </div>
            <button
              onClick={finishWorkout}
              style={{
                background: "#10b981", color: "#fff", border: "none", padding: "8px 16px",
                borderRadius: 8, fontSize: 14, fontWeight: 600, cursor: "pointer",
                minHeight: 44, touchAction: "manipulation",
              }}
            >
              <Icon name="check" size={16} color="#fff" style={{ display: "inline", marginRight: 6 }} />
              Finish
            </button>
          </div>

          {currentWorkout.exercises.map((ex, exIdx) => {
            const isShowingFeedback = completedExerciseIdx === exIdx;
            const doneSets = ex.sets.filter(s => s.done).length;
            const targetRIR = mesocycle ? getTargetRIR(mesocycle.currentWeek, mesocycle.deloadWeeks?.includes(mesocycle.currentWeek)) : 0;
            const prevPerf = getPrevPerformance(ex.name);
            const suggested = prevPerf ? getSuggestedLoad(prevPerf, mesocycle?.currentWeek || 1, mesocycle?.deloadWeeks?.includes(mesocycle?.currentWeek)) : {};

            return (
              <Card key={exIdx} style={{ borderColor: isShowingFeedback ? "#8b5cf6" : "#1f1f1f" }}>
                {isShowingFeedback ? (
                  <ExerciseFeedback
                    exerciseName={ex.name}
                    muscle={ex.muscle}
                    onSubmit={(feedback) => setExerciseFeedback(exIdx, feedback)}
                  />
                ) : (
                  <>
                    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "start", marginBottom: 12 }}>
                      <div>
                        <div style={{ fontSize: 14, fontWeight: 600, color: "#fff" }}>{ex.name}</div>
                        <div style={{ fontSize: 11, color: "#888", marginTop: 2, textTransform: "capitalize" }}>{ex.muscle} • {ex.targetReps} reps • {doneSets}/{ex.targetSets} sets</div>
                      </div>
                      <button
                        onClick={() => removeExercise(exIdx)}
                        style={{
                          background: "none", border: "none", color: "#ef4444", cursor: "pointer",
                          fontSize: 14, padding: 4, minWidth: 32, minHeight: 32, display: "flex",
                          alignItems: "center", justifyContent: "center", touchAction: "manipulation",
                        }}
                      >
                        <Icon name="x" size={18} color="#ef4444" />
                      </button>
                    </div>

                    {mesocycle && (
                      <div style={{ fontSize: 11, color: "#888", marginBottom: 8, padding: "6px 8px", background: "#0a0a0a", borderRadius: 6 }}>
                        Target RIR: {targetRIR}
                      </div>
                    )}

                    {suggested.weight && (
                      <div style={{ fontSize: 11, color: "#10b981", marginBottom: 8, padding: "6px 8px", background: "#0a0a0a", borderRadius: 6 }}>
                        Suggested: {suggested.weight}×{suggested.reps} based on last session
                      </div>
                    )}

                    {ex.feedback && (
                      <div style={{ fontSize: 11, color: "#8b5cf6", marginBottom: 8, padding: "6px 8px", background: "#0a0a0a", borderRadius: 6 }}>
                        Feedback: Pump {ex.feedback.pump}/5 • Soreness {ex.feedback.soreness}/5 • Joint {ex.feedback.jointPain}/4 • Perf {["","Worse","Same","Better"][ex.feedback.performance]}
                      </div>
                    )}

                    {ex.sets.map((set, setIdx) => (
                      <div key={setIdx} style={{ background: "#0f0f0f", borderRadius: 8, padding: 10, marginBottom: 8 }}>
                        <div style={{ display: "flex", gap: 8, alignItems: "flex-end" }}>
                          <div style={{ flex: 1 }}>
                            <div style={{ fontSize: 10, color: "#888", marginBottom: 4 }}>Weight (lbs)</div>
                            <input
                              type="number" value={set.weight || ""} inputMode="numeric"
                              onChange={(e) => updateSet(exIdx, setIdx, "weight", parseFloat(e.target.value) || 0)}
                              style={{
                                width: "100%", background: "#1a1a1a", color: "#fff", border: "1px solid #222",
                                padding: "8px", borderRadius: 4, fontSize: 14, minHeight: 40,
                              }}
                            />
                          </div>
                          <div style={{ flex: 1 }}>
                            <div style={{ fontSize: 10, color: "#888", marginBottom: 4 }}>Reps</div>
                            <input
                              type="number" value={set.reps || ""} inputMode="numeric"
                              onChange={(e) => updateSet(exIdx, setIdx, "reps", parseFloat(e.target.value) || 0)}
                              style={{
                                width: "100%", background: "#1a1a1a", color: "#fff", border: "1px solid #222",
                                padding: "8px", borderRadius: 4, fontSize: 14, minHeight: 40,
                              }}
                            />
                          </div>
                          <button
                            onClick={() => toggleSetDone(exIdx, setIdx)}
                            style={{
                              background: set.done ? "#10b981" : "#222", color: set.done ? "#fff" : "#666",
                              border: "none", borderRadius: 6, width: 40, height: 40, cursor: "pointer",
                              display: "flex", alignItems: "center", justifyContent: "center", minHeight: 40,
                              touchAction: "manipulation",
                            }}
                          >
                            {set.done && <Icon name="check" size={18} color="#fff" />}
                          </button>
                        </div>
                        {mesocycle && (
                          <div style={{ display: "flex", gap: 4, marginTop: 6 }}>
                            <span style={{ fontSize: 10, color: "#666", alignSelf: "center", marginRight: 4 }}>RIR:</span>
                            {[0, 1, 2, 3, 4].map(rir => (
                              <button
                                key={rir}
                                onClick={() => updateSet(exIdx, setIdx, "actualRir", rir)}
                                style={{
                                  width: 32, height: 28, borderRadius: 4, fontSize: 11, fontWeight: 600,
                                  border: "none", cursor: "pointer", touchAction: "manipulation",
                                  background: set.actualRir === rir ? (rir <= targetRIR ? "#10b981" : rir === targetRIR + 1 ? "#f59e0b" : "#ef4444") : "#1a1a1a",
                                  color: set.actualRir === rir ? "#fff" : "#666",
                                }}
                              >
                                {rir}
                              </button>
                            ))}
                          </div>
                        )}
                      </div>
                    ))}

                    <div style={{ display: "flex", gap: 8 }}>
                      <button
                        onClick={() => addSet(exIdx)}
                        style={{
                          flex: 1, background: "#222", color: "#888", border: "none", padding: "10px",
                          borderRadius: 8, fontSize: 14, cursor: "pointer", minHeight: 40, touchAction: "manipulation",
                        }}
                      >
                        <Icon name="plus" size={16} /> Add Set
                      </button>
                      <button
                        onClick={() => removeSet(exIdx)}
                        style={{
                          flex: 1, background: "#222", color: "#888", border: "none", padding: "10px",
                          borderRadius: 8, fontSize: 14, cursor: "pointer", minHeight: 40, touchAction: "manipulation",
                        }}
                      >
                        <Icon name="minus" size={16} /> Remove
                      </button>
                      {doneSets === ex.targetSets && !ex.feedback && (
                        <button
                          onClick={() => setCompletedExerciseIdx(exIdx)}
                          style={{
                            flex: 1, padding: "10px", background: "#8b5cf6", border: "none", borderRadius: 8,
                            color: "#fff", fontSize: 14, fontWeight: 600, cursor: "pointer", minHeight: 40,
                            touchAction: "manipulation",
                          }}
                        >
                          <Icon name="check" size={14} /> Feedback
                        </button>
                      )}
                    </div>
                  </>
                )}
              </Card>
            );
          })}

          <button
            onClick={() => setShowExercisePicker(true)}
            style={{
              width: "100%", background: "#1f1f1f", color: "#ccc", border: "1px solid #222",
              padding: "12px", borderRadius: 8, fontSize: 14, cursor: "pointer", marginBottom: 12,
              minHeight: 44, touchAction: "manipulation",
            }}
          >
            <Icon name="plus" size={16} /> Add Exercise
          </button>

          {showExercisePicker && (
            <div style={{ position: "fixed", bottom: 0, left: 0, right: 0, top: 0, background: "rgba(0,0,0,0.8)", zIndex: 1000, display: "flex", alignItems: "flex-end" }}>
              <div style={{ width: "100%", background: "#141414", borderTopLeftRadius: 16, borderTopRightRadius: 16, padding: 16, maxHeight: "80vh", overflow: "auto" }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
                  <div style={{ fontSize: 16, fontWeight: 700, color: "#fff" }}>Select Exercise</div>
                  <button
                    onClick={() => { setShowExercisePicker(false); setSelectedMuscle(null); }}
                    style={{
                      background: "none", border: "none", color: "#888", cursor: "pointer",
                      fontSize: 20, padding: 4, minWidth: 32, minHeight: 32,
                    }}
                  >
                    ×
                  </button>
                </div>

                <div style={{ marginBottom: 16, display: "flex", flexWrap: "wrap", gap: 6 }}>
                  {Object.keys(EXERCISES).map(muscle => (
                    <button
                      key={muscle}
                      onClick={() => setSelectedMuscle(selectedMuscle === muscle ? null : muscle)}
                      style={{
                        background: selectedMuscle === muscle ? MUSCLE_COLORS[muscle] : "#222",
                        color: selectedMuscle === muscle ? "#fff" : "#888",
                        border: "none", padding: "8px 12px", borderRadius: 6, fontSize: 12,
                        cursor: "pointer", textTransform: "capitalize", minHeight: 36,
                        touchAction: "manipulation",
                      }}
                    >
                      {muscle}
                    </button>
                  ))}
                </div>

                {selectedMuscle ? (
                  <div>
                    {EXERCISES[selectedMuscle].map(ex => (
                      <button
                        key={ex.name}
                        onClick={() => addExercise(ex.name, selectedMuscle)}
                        style={{
                          width: "100%", background: "#1a1a1a", color: "#fff", border: "1px solid #222",
                          padding: "12px", marginBottom: 8, borderRadius: 8, fontSize: 14, cursor: "pointer",
                          textAlign: "left", minHeight: 44, touchAction: "manipulation",
                        }}
                      >
                        <div style={{ fontWeight: 500 }}>{ex.name}</div>
                        <div style={{ fontSize: 11, color: "#888", marginTop: 2 }}>{ex.type} • {ex.equipment}</div>
                      </button>
                    ))}
                  </div>
                ) : (
                  <div style={{ color: "#888", fontSize: 14, textAlign: "center", padding: "20px" }}>
                    Select a muscle group above
                  </div>
                )}
              </div>
            </div>
          )}
        </div>
      );
    }

    // ─── PROGRAMS VIEW ───────────────────────────────────────────────────────
    // ─── EXERCISE FEEDBACK COMPONENT ────────────────────────────────────────────
    function ExerciseFeedback({ exerciseName, muscle, onSubmit }) {
      const [feedback, setFeedback] = useState({ pump: 0, soreness: 0, jointPain: 0, performance: 0 });

      const handleSubmit = () => {
        if (feedback.pump > 0 && feedback.soreness > 0 && feedback.jointPain > 0 && feedback.performance > 0) {
          onSubmit(feedback);
        }
      };

      const pumpOptions = [
        { value: 1, label: "None", color: "#666" },
        { value: 2, label: "Low", color: "#f59e0b" },
        { value: 3, label: "Moderate", color: "#3b82f6" },
        { value: 4, label: "Great", color: "#10b981" },
        { value: 5, label: "Extreme", color: "#ef4444" },
      ];
      const sorenessOptions = [
        { value: 1, label: "None", color: "#666" },
        { value: 2, label: "Light", color: "#f59e0b" },
        { value: 3, label: "Moderate", color: "#3b82f6" },
        { value: 4, label: "Heavy", color: "#ef4444" },
        { value: 5, label: "Severe", color: "#8b0000" },
      ];
      const jointPainOptions = [
        { value: 1, label: "None", color: "#666" },
        { value: 2, label: "Mild", color: "#f59e0b" },
        { value: 3, label: "Moderate", color: "#ef4444" },
        { value: 4, label: "Severe", color: "#8b0000" },
      ];
      const performanceOptions = [
        { value: 1, label: "Worse", color: "#ef4444" },
        { value: 2, label: "Same", color: "#888" },
        { value: 3, label: "Better", color: "#10b981" },
      ];

      const ChipRow = ({ label, options, field }) => (
        <div style={{ marginBottom: 14 }}>
          <div style={{ fontSize: 11, color: "#aaa", marginBottom: 6, textTransform: "uppercase", letterSpacing: 1 }}>{label}</div>
          <div style={{ display: "flex", gap: 6 }}>
            {options.map(opt => (
              <button
                key={opt.value}
                onClick={() => setFeedback({ ...feedback, [field]: opt.value })}
                style={{
                  flex: 1, padding: "10px 4px", touchAction: "manipulation",
                  background: feedback[field] === opt.value ? opt.color : "#1a1a1a",
                  border: feedback[field] === opt.value ? `2px solid ${opt.color}` : "1px solid #333",
                  borderRadius: 6, color: feedback[field] === opt.value ? "#fff" : "#888",
                  fontSize: 11, fontWeight: 600, cursor: "pointer", minHeight: 40,
                }}
              >
                {opt.label}
              </button>
            ))}
          </div>
        </div>
      );

      const allSelected = feedback.pump > 0 && feedback.soreness > 0 && feedback.jointPain > 0 && feedback.performance > 0;

      return (
        <div>
          <div style={{ fontSize: 14, fontWeight: 600, color: "#fff", marginBottom: 16 }}>
            How was {exerciseName}?
          </div>
          <ChipRow label="Pump" options={pumpOptions} field="pump" />
          <ChipRow label="Soreness" options={sorenessOptions} field="soreness" />
          <ChipRow label="Joint Pain" options={jointPainOptions} field="jointPain" />
          <ChipRow label="Performance vs. Last Time" options={performanceOptions} field="performance" />
          <button
            onClick={handleSubmit}
            disabled={!allSelected}
            style={{
              width: "100%", padding: "12px", background: "#10b981", border: "none", borderRadius: 6,
              color: "#fff", fontSize: 14, fontWeight: 600, cursor: "pointer", minHeight: 44,
              touchAction: "manipulation", opacity: allSelected ? 1 : 0.5,
            }}
          >
            <Icon name="check" size={16} color="#fff" /> Confirm Feedback
          </button>
        </div>
      );
    }

    function ProgramsView({ activeProgram, setActiveProgram, setMesocycle, equipmentFilter, setEquipmentFilter, setActiveTab, setCurrentWorkout, customPrograms, setCustomPrograms }) {
      const [expandedProgram, setExpandedProgram] = useState(null);
      const [showCreator, setShowCreator] = useState(false);

      // ─── WORKOUT CREATOR STATE ───
      const [creatorName, setCreatorName] = useState("");
      const [creatorDays, setCreatorDays] = useState([{ name: "Day 1", exercises: [] }]);
      const [creatorPickerDay, setCreatorPickerDay] = useState(null);
      const [creatorPickerMuscle, setCreatorPickerMuscle] = useState(null);

      const addDay = () => {
        setCreatorDays(prev => [...prev, { name: "Day " + (prev.length + 1), exercises: [] }]);
      };

      const removeDay = (dayIdx) => {
        if (creatorDays.length <= 1) return;
        setCreatorDays(prev => prev.filter((_, i) => i !== dayIdx));
      };

      const renameDayName = (dayIdx, newName) => {
        setCreatorDays(prev => prev.map((d, i) => i === dayIdx ? { ...d, name: newName } : d));
      };

      const addExerciseToDay = (dayIdx, exerciseName, muscle) => {
        setCreatorDays(prev => prev.map((d, i) => i === dayIdx ? {
          ...d,
          exercises: [...d.exercises, { exercise: exerciseName, muscle, sets: 3, reps: "8-12", equipment: "barbell" }]
        } : d));
        setCreatorPickerDay(null);
        setCreatorPickerMuscle(null);
      };

      const removeExerciseFromDay = (dayIdx, exIdx) => {
        setCreatorDays(prev => prev.map((d, i) => i === dayIdx ? {
          ...d, exercises: d.exercises.filter((_, j) => j !== exIdx)
        } : d));
      };

      const updateExerciseField = (dayIdx, exIdx, field, value) => {
        setCreatorDays(prev => prev.map((d, i) => i === dayIdx ? {
          ...d, exercises: d.exercises.map((ex, j) => j === exIdx ? { ...ex, [field]: value } : ex)
        } : d));
      };

      const saveCustomProgram = () => {
        if (!creatorName.trim()) return;
        if (creatorDays.some(d => d.exercises.length === 0)) return;
        const days = {};
        const split = [];
        creatorDays.forEach(d => {
          days[d.name] = d.exercises;
          split.push(d.name);
        });
        const prog = {
          id: "custom_" + generateId(),
          name: creatorName.trim(),
          description: "Custom workout - " + creatorDays.length + " days",
          attribution: "You",
          daysPerWeek: creatorDays.length,
          split,
          days,
          isCustom: true,
        };
        setCustomPrograms(prev => [...prev, prog]);
        setCreatorName("");
        setCreatorDays([{ name: "Day 1", exercises: [] }]);
        setShowCreator(false);
      };

      const deleteCustomProgram = (progId) => {
        setCustomPrograms(prev => prev.filter(p => p.id !== progId));
        if (activeProgram === progId) {
          setActiveProgram(null);
          setCurrentWorkout(null);
        }
      };

      const allPrograms = [...PROGRAMS, ...(customPrograms || [])];

      // ─── EXERCISE PICKER FOR CREATOR ───
      if (creatorPickerDay !== null) {
        return (
          <div style={{ paddingTop: 16 }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
              <div style={{ fontSize: 16, fontWeight: 700, color: "#fff" }}>Add Exercise</div>
              <button onClick={() => { setCreatorPickerDay(null); setCreatorPickerMuscle(null); }}
                style={{ background: "none", border: "none", color: "#888", fontSize: 20, cursor: "pointer", padding: 8, minHeight: 32 }}>×</button>
            </div>
            <div style={{ display: "flex", flexWrap: "wrap", gap: 6, marginBottom: 16 }}>
              {Object.keys(EXERCISES).map(muscle => (
                <button key={muscle}
                  onClick={() => setCreatorPickerMuscle(creatorPickerMuscle === muscle ? null : muscle)}
                  style={{
                    background: creatorPickerMuscle === muscle ? (MUSCLE_COLORS[muscle] || "#ef4444") : "#222",
                    color: creatorPickerMuscle === muscle ? "#fff" : "#888",
                    border: "none", padding: "8px 12px", borderRadius: 6, fontSize: 12,
                    cursor: "pointer", textTransform: "capitalize", minHeight: 36, touchAction: "manipulation",
                  }}
                >{muscle}</button>
              ))}
            </div>
            {creatorPickerMuscle ? (
              <div>
                {EXERCISES[creatorPickerMuscle]?.map((ex, i) => (
                  <Card key={i} style={{ cursor: "pointer" }}
                    onClick={() => addExerciseToDay(creatorPickerDay, ex.name, creatorPickerMuscle)}>
                    <div style={{ fontSize: 14, color: "#fff" }}>{ex.name}</div>
                    <div style={{ fontSize: 11, color: "#666", marginTop: 2 }}>{ex.type} • {ex.equipment}</div>
                  </Card>
                ))}
              </div>
            ) : (
              <Card><div style={{ fontSize: 13, color: "#888", textAlign: "center" }}>Select a muscle group above</div></Card>
            )}
          </div>
        );
      }

      // ─── WORKOUT CREATOR SCREEN ───
      if (showCreator) {
        const canSave = creatorName.trim() && creatorDays.every(d => d.exercises.length > 0);
        return (
          <div style={{ paddingTop: 16 }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
              <div style={{ fontSize: 18, fontWeight: 700, color: "#fff" }}>Create Workout</div>
              <button onClick={() => setShowCreator(false)}
                style={{ background: "none", border: "none", color: "#888", fontSize: 20, cursor: "pointer", padding: 8, minHeight: 32 }}>×</button>
            </div>

            <Card>
              <div style={{ fontSize: 12, color: "#888", marginBottom: 6, textTransform: "uppercase" }}>Program Name</div>
              <input type="text" value={creatorName}
                onChange={(e) => setCreatorName(e.target.value)}
                placeholder="e.g. My PPL, Upper/Lower, Full Body..."
                style={{
                  width: "100%", background: "#0f0f0f", color: "#fff", border: "1px solid #333",
                  padding: "12px", borderRadius: 6, fontSize: 16, boxSizing: "border-box",
                }}
              />
            </Card>

            {creatorDays.map((day, dayIdx) => (
              <Card key={dayIdx}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
                  <input type="text" value={day.name}
                    onChange={(e) => renameDayName(dayIdx, e.target.value)}
                    style={{
                      background: "transparent", color: "#fff", border: "none", borderBottom: "1px solid #333",
                      fontSize: 14, fontWeight: 600, padding: "4px 0", flex: 1,
                    }}
                  />
                  {creatorDays.length > 1 && (
                    <button onClick={() => removeDay(dayIdx)}
                      style={{ background: "none", border: "none", color: "#ef4444", cursor: "pointer", padding: 4, minWidth: 32, minHeight: 32, touchAction: "manipulation" }}>
                      <Icon name="x" size={16} color="#ef4444" />
                    </button>
                  )}
                </div>

                {day.exercises.length === 0 ? (
                  <div style={{ fontSize: 12, color: "#666", textAlign: "center", padding: "8px 0" }}>No exercises yet</div>
                ) : (
                  day.exercises.map((ex, exIdx) => (
                    <div key={exIdx} style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 8, background: "#0f0f0f", padding: 8, borderRadius: 6 }}>
                      <div style={{ flex: 1, minWidth: 0 }}>
                        <div style={{ fontSize: 13, color: "#fff", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{ex.exercise}</div>
                        <div style={{ fontSize: 10, color: "#666", textTransform: "capitalize" }}>{ex.muscle}</div>
                      </div>
                      <input type="number" value={ex.sets} inputMode="numeric"
                        onChange={(e) => updateExerciseField(dayIdx, exIdx, "sets", parseInt(e.target.value) || 1)}
                        style={{ width: 40, background: "#1a1a1a", color: "#fff", border: "1px solid #333", borderRadius: 4, padding: "4px", fontSize: 13, textAlign: "center" }}
                      />
                      <span style={{ fontSize: 11, color: "#666" }}>x</span>
                      <input type="text" value={ex.reps}
                        onChange={(e) => updateExerciseField(dayIdx, exIdx, "reps", e.target.value)}
                        style={{ width: 50, background: "#1a1a1a", color: "#fff", border: "1px solid #333", borderRadius: 4, padding: "4px", fontSize: 13, textAlign: "center" }}
                      />
                      <button onClick={() => removeExerciseFromDay(dayIdx, exIdx)}
                        style={{ background: "none", border: "none", color: "#ef4444", cursor: "pointer", padding: 2, minWidth: 28, minHeight: 28, touchAction: "manipulation" }}>
                        <Icon name="x" size={14} color="#ef4444" />
                      </button>
                    </div>
                  ))
                )}

                <button onClick={() => setCreatorPickerDay(dayIdx)}
                  style={{
                    width: "100%", background: "#1a1a2e", color: "#818cf8", border: "none",
                    padding: "10px", borderRadius: 6, fontSize: 13, fontWeight: 500, cursor: "pointer",
                    marginTop: 4, minHeight: 40, touchAction: "manipulation",
                  }}
                >
                  <Icon name="plus" size={14} color="#818cf8" /> Add Exercise
                </button>
              </Card>
            ))}

            <button onClick={addDay}
              style={{
                width: "100%", background: "#222", color: "#ccc", border: "1px dashed #444",
                padding: "12px", borderRadius: 8, fontSize: 14, cursor: "pointer",
                marginBottom: 12, minHeight: 44, touchAction: "manipulation",
              }}
            >
              <Icon name="plus" size={16} /> Add Day
            </button>

            <button onClick={saveCustomProgram} disabled={!canSave}
              style={{
                width: "100%", background: canSave ? "linear-gradient(135deg, #22c55e, #16a34a)" : "#333",
                color: "#fff", border: "none", padding: "14px", borderRadius: 8, fontSize: 16,
                fontWeight: 700, cursor: canSave ? "pointer" : "default",
                opacity: canSave ? 1 : 0.5, minHeight: 48, touchAction: "manipulation",
              }}
            >
              Save Program
            </button>
          </div>
        );
      }

      // ─── MAIN PROGRAMS LIST ───
      return (
        <div style={{ paddingTop: 16 }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
            <div style={{ fontSize: 18, fontWeight: 700, color: "#fff" }}>Programs</div>
            <button onClick={() => setShowCreator(true)}
              style={{
                background: "linear-gradient(135deg, #22c55e, #16a34a)", color: "#fff", border: "none",
                padding: "8px 14px", borderRadius: 8, fontSize: 13, fontWeight: 600,
                cursor: "pointer", minHeight: 36, touchAction: "manipulation",
              }}
            >
              <Icon name="plus" size={14} color="#fff" /> Create
            </button>
          </div>

          <div style={{ marginBottom: 16 }}>
            <div style={{ fontSize: 12, color: "#888", textTransform: "uppercase", marginBottom: 8 }}>Equipment Filter</div>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8 }}>
              {[
                { id: "full", label: "Full Gym" },
                { id: "dumbbells", label: "Dumbbells" },
                { id: "no_barbell", label: "No Barbell" },
                { id: "machines", label: "Machines" },
              ].map(opt => (
                <button
                  key={opt.id}
                  onClick={() => setEquipmentFilter(opt.id)}
                  style={{
                    background: equipmentFilter === opt.id ? "#22c55e" : "#222",
                    color: "#fff", border: "none", padding: "10px", borderRadius: 8,
                    fontSize: 12, cursor: "pointer", minHeight: 40, fontWeight: 500,
                    touchAction: "manipulation",
                  }}
                >
                  {opt.label}
                </button>
              ))}
            </div>
          </div>

          {customPrograms && customPrograms.length > 0 && (
            <div style={{ marginBottom: 8 }}>
              <div style={{ fontSize: 12, color: "#f97316", textTransform: "uppercase", marginBottom: 8, letterSpacing: 1 }}>My Workouts</div>
              {customPrograms.map(prog => (
                <Card
                  key={prog.id}
                  style={{
                    borderColor: activeProgram === prog.id ? "#f97316" : "#1f1f1f",
                    cursor: "pointer", transition: "border-color 0.2s",
                  }}
                  onClick={() => setExpandedProgram(expandedProgram === prog.id ? null : prog.id)}
                >
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "start" }}>
                    <div style={{ flex: 1 }}>
                      <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                        <div style={{ fontSize: 16, fontWeight: 700, color: "#fff" }}>{prog.name}</div>
                        <span style={{ fontSize: 9, color: "#f97316", background: "#2a1800", padding: "2px 6px", borderRadius: 4 }}>CUSTOM</span>
                      </div>
                      <div style={{ fontSize: 12, color: "#888", marginTop: 4 }}>{prog.split.length} days • {Object.values(prog.days).reduce((sum, d) => sum + d.length, 0)} exercises</div>
                    </div>
                    <Icon name={expandedProgram === prog.id ? "chevron-up" : "chevron-down"} size={20} color="#888" />
                  </div>

                  {expandedProgram === prog.id && (
                    <div style={{ marginTop: 16, paddingTop: 16, borderTop: "1px solid #222" }}>
                      {prog.split.map((dayName, i) => {
                        const filtered = filterExercisesByEquipment(prog.days[dayName] || [], equipmentFilter);
                        return (
                          <div key={i} style={{ marginBottom: 12 }}>
                            <div style={{ fontSize: 12, fontWeight: 600, color: "#ccc", marginBottom: 4 }}>{dayName} ({filtered.length})</div>
                            {filtered.map((ex, j) => (
                              <div key={j} style={{ fontSize: 11, color: "#888", marginLeft: 8 }}>
                                {ex.exercise} • {ex.sets}x{ex.reps}
                              </div>
                            ))}
                          </div>
                        );
                      })}
                      <div style={{ display: "flex", gap: 8 }}>
                        <button
                          onClick={(e) => {
                            e.stopPropagation();
                            setActiveProgram(prog.id);
                            setCurrentWorkout(null);
                            setMesocycle({ id: generateId(), totalWeeks: 4, currentWeek: 1, deloadWeeks: [4] });
                            setActiveTab("workout");
                          }}
                          style={{
                            flex: 1, background: "#22c55e", color: "#fff", border: "none",
                            padding: "10px", borderRadius: 8, fontSize: 14, fontWeight: 600,
                            cursor: "pointer", marginTop: 12, minHeight: 44, touchAction: "manipulation",
                          }}
                        >
                          Start Program
                        </button>
                        <button
                          onClick={(e) => { e.stopPropagation(); deleteCustomProgram(prog.id); }}
                          style={{
                            background: "#2a0000", color: "#ef4444", border: "none",
                            padding: "10px 14px", borderRadius: 8, fontSize: 12, fontWeight: 600,
                            cursor: "pointer", marginTop: 12, minHeight: 44, touchAction: "manipulation",
                          }}
                        >
                          <Icon name="x" size={14} color="#ef4444" />
                        </button>
                      </div>
                    </div>
                  )}
                </Card>
              ))}
            </div>
          )}

          <div style={{ fontSize: 12, color: "#888", textTransform: "uppercase", marginBottom: 8, letterSpacing: 1 }}>Built-in Programs</div>
          {PROGRAMS.map(prog => (
            <Card
              key={prog.id}
              style={{
                borderColor: activeProgram === prog.id ? "#22c55e" : "#1f1f1f",
                cursor: "pointer", transition: "border-color 0.2s",
              }}
              onClick={() => setExpandedProgram(expandedProgram === prog.id ? null : prog.id)}
            >
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "start" }}>
                <div style={{ flex: 1 }}>
                  <div style={{ fontSize: 16, fontWeight: 700, color: "#fff" }}>{prog.name}</div>
                  <div style={{ fontSize: 12, color: "#888", marginTop: 4 }}>{prog.description}</div>
                  <div style={{ fontSize: 10, color: "#666", marginTop: 6 }}>By {prog.attribution}</div>
                </div>
                <Icon name={expandedProgram === prog.id ? "chevron-up" : "chevron-down"} size={20} color="#888" />
              </div>

              {expandedProgram === prog.id && (
                <div style={{ marginTop: 16, paddingTop: 16, borderTop: "1px solid #222" }}>
                  {prog.split.map((dayName, i) => {
                    const filtered = filterExercisesByEquipment(prog.days[dayName] || [], equipmentFilter);
                    return (
                      <div key={i} style={{ marginBottom: 12 }}>
                        <div style={{ fontSize: 12, fontWeight: 600, color: "#ccc", marginBottom: 4 }}>{dayName} ({filtered.length})</div>
                        {filtered.map((ex, j) => (
                          <div key={j} style={{ fontSize: 11, color: "#888", marginLeft: 8 }}>
                            {ex.exercise} • {ex.sets}x{ex.reps}
                          </div>
                        ))}
                      </div>
                    );
                  })}

                  <button
                    onClick={(e) => {
                      e.stopPropagation();
                      setActiveProgram(prog.id);
                      setCurrentWorkout(null);
                      setMesocycle({ id: generateId(), totalWeeks: 4, currentWeek: 1, deloadWeeks: [4] });
                      setActiveTab("workout");
                    }}
                    style={{
                      width: "100%", background: "#22c55e", color: "#fff", border: "none",
                      padding: "10px", borderRadius: 8, fontSize: 14, fontWeight: 600,
                      cursor: "pointer", marginTop: 12, minHeight: 44, touchAction: "manipulation",
                    }}
                  >
                    Start Program
                  </button>
                </div>
              )}
            </Card>
          ))}
        </div>
      );
    }

    // ─── VOLUME VIEW ───────────────────────────────────────────────────────
    function VolumeView({ weeklyVolume, workoutLog, fatigueData, mesoSetTargets }) {
      return (
        <div style={{ paddingTop: 16 }}>
          <div style={{ fontSize: 18, fontWeight: 700, color: "#fff", marginBottom: 16 }}>Volume Analysis</div>

          <Card>
            <div style={{ fontSize: 14, fontWeight: 600, color: "#fff", marginBottom: 12 }}>This Week's Volume</div>
            {Object.entries(weeklyVolume).map(([muscle, sets]) => {
              const lm = VOLUME_LANDMARKS[muscle];
              let status = sets < lm.mv ? "below" : sets < lm.mav ? "good" : "high";
              return (
                <div key={muscle} style={{ marginBottom: 12 }}>
                  <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 4 }}>
                    <span style={{ textTransform: "capitalize", color: "#ccc", fontSize: 12 }}>{muscle}</span>
                    <span style={{
                      fontSize: 11, color: status === "below" ? "#f59e0b" : status === "good" ? "#10b981" : "#ef4444",
                      fontWeight: 600,
                    }}>
                      {sets} / {lm.mv}-{lm.mav}-{lm.mrv}
                    </span>
                  </div>
                  <div style={{ background: "#0f0f0f", height: 6, borderRadius: 3, overflow: "hidden", position: "relative" }}>
                    <div style={{ height: "100%", background: MUSCLE_COLORS[muscle], width: `${Math.min((sets / lm.mrv) * 100, 100)}%` }}/>
                    <div style={{ position: "absolute", left: `${(lm.mv / lm.mrv) * 100}%`, top: 0, bottom: 0, width: 1, background: "#555" }}/>
                    <div style={{ position: "absolute", left: `${(lm.mav / lm.mrv) * 100}%`, top: 0, bottom: 0, width: 1, background: "#888" }}/>
                  </div>
                </div>
              );
            })}
          </Card>

          {Object.keys(fatigueData.muscles).length > 0 && (
            <Card>
              <div style={{ fontSize: 14, fontWeight: 600, color: "#fff", marginBottom: 12 }}>Muscle Fatigue</div>
              {Object.entries(fatigueData.muscles).map(([muscle, data]) => (
                <div key={muscle} style={{ marginBottom: 10, paddingBottom: 10, borderBottom: "1px solid #222" }}>
                  <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 4 }}>
                    <span style={{ textTransform: "capitalize", color: "#ccc", fontSize: 12, fontWeight: 500 }}>{muscle}</span>
                    <span style={{
                      fontSize: 11, color: data.score >= 70 ? "#ef4444" : data.score >= 50 ? "#f59e0b" : "#10b981",
                      fontWeight: 600,
                    }}>
                      {Math.round(data.score)} - {data.label}
                    </span>
                  </div>
                  <div style={{ background: "#0f0f0f", height: 4, borderRadius: 2, overflow: "hidden" }}>
                    <div style={{ height: "100%", background: data.score >= 70 ? "#ef4444" : data.score >= 50 ? "#f59e0b" : "#10b981", width: `${Math.min(data.score, 100)}%` }}/>
                  </div>
                </div>
              ))}
            </Card>
          )}
        </div>
      );
    }

    // ─── MESOCYCLE VIEW ───────────────────────────────────────────────────────
    function MesocycleView({ mesocycle, setMesocycle, workoutLog, activeProgram, fatigueData, mesoSetTargets }) {
      if (!mesocycle) {
        return (
          <div style={{ paddingTop: 16 }}>
            <div style={{ fontSize: 18, fontWeight: 700, color: "#fff", marginBottom: 16 }}>Mesocycle</div>
            <Card>
              <div style={{ fontSize: 14, color: "#888" }}>Select a program first to start a mesocycle</div>
            </Card>
          </div>
        );
      }

      return (
        <div style={{ paddingTop: 16 }}>
          <div style={{ fontSize: 18, fontWeight: 700, color: "#fff", marginBottom: 16 }}>Mesocycle</div>

          <Card>
            <div style={{ fontSize: 14, fontWeight: 600, color: "#fff", marginBottom: 12 }}>Progress</div>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
              <div style={{ fontSize: 12, color: "#888" }}>Week {mesocycle.currentWeek} of {mesocycle.totalWeeks}</div>
              <div style={{ fontSize: 12, color: "#888" }}>
                {mesocycle.deloadWeeks?.includes(mesocycle.currentWeek) ? "Deload Week" : "Regular Week"}
              </div>
            </div>
            <div style={{ background: "#0f0f0f", height: 8, borderRadius: 4, overflow: "hidden" }}>
              <div style={{ height: "100%", background: "#ef4444", width: `${(mesocycle.currentWeek / mesocycle.totalWeeks) * 100}%` }}/>
            </div>
          </Card>

          {Object.entries(mesoSetTargets).length > 0 && (
            <Card>
              <div style={{ fontSize: 14, fontWeight: 600, color: "#fff", marginBottom: 12 }}>Week {mesocycle.currentWeek} Targets</div>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8 }}>
                {Object.entries(mesoSetTargets).map(([muscle, weekTargets]) => (
                  <div key={muscle}>
                    <div style={{ fontSize: 11, color: "#888", textTransform: "capitalize", marginBottom: 4 }}>{muscle}</div>
                    <div style={{ fontSize: 16, fontWeight: 700, color: MUSCLE_COLORS[muscle] }}>
                      {weekTargets[mesocycle.currentWeek]} sets
                    </div>
                  </div>
                ))}
              </div>
            </Card>
          )}
        </div>
      );
    }

    // ─── HISTORY VIEW ───────────────────────────────────────────────────────
    function HistoryView({ workoutLog, setWorkoutLog }) {
      return (
        <div style={{ paddingTop: 16 }}>
          <div style={{ fontSize: 18, fontWeight: 700, color: "#fff", marginBottom: 16 }}>Workout History</div>

          {workoutLog.length === 0 ? (
            <Card>
              <div style={{ fontSize: 14, color: "#888", textAlign: "center", padding: 20 }}>
                No workouts logged yet. Start training!
              </div>
            </Card>
          ) : (
            workoutLog.slice().reverse().map((w, i) => (
              <Card key={w.id}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "start", marginBottom: 8 }}>
                  <div>
                    <div style={{ fontSize: 14, fontWeight: 600, color: "#fff" }}>{w.dayName}</div>
                    <div style={{ fontSize: 12, color: "#888", marginTop: 2 }}>
                      {formatDate(w.date)} • {w.duration} min
                    </div>
                  </div>
                  <button
                    onClick={() => setWorkoutLog(prev => prev.filter(x => x.id !== w.id))}
                    style={{
                      background: "none", border: "none", color: "#ef4444", cursor: "pointer",
                      fontSize: 14, padding: 4, minWidth: 32, minHeight: 32, display: "flex",
                      alignItems: "center", justifyContent: "center", touchAction: "manipulation",
                    }}
                  >
                    <Icon name="x" size={18} color="#ef4444" />
                  </button>
                </div>
                <div style={{ fontSize: 12, color: "#888" }}>
                  {w.exercises.length} exercises • {w.exercises.reduce((sum, ex) => sum + ex.sets.filter(s => s.done).length, 0)} sets
                </div>
              </Card>
            ))
          )}
        </div>
      );
    }

    // ─── RENDER APP ─────────────────────────────────────────────────────────
    ReactDOM.render(<HypertrophyApp />, document.getElementById("root"));
  </script>
</body>
</html>
