    function computeRecoveryInsights(workoutLog, activeProgram, mesocycle, schedule) {
      const insights = { needsDeload: false, deloadReasons: [], suggestions: [], streakDays: 0, restDaysSinceLastWorkout: 0 };
      if (!activeProgram || workoutLog.length === 0) return insights;

      const recovery = PROGRAM_RECOVERY[activeProgram];
      if (!recovery) return insights;

      const today = new Date();
      const todayStr = today.toISOString().split("T")[0];

      // Calculate training streak and rest
      const sortedLog = [...workoutLog].sort((a, b) => b.date.localeCompare(a.date));
      if (sortedLog.length > 0) {
        const lastWorkoutDate = new Date(sortedLog[0].date + "T12:00:00");
        insights.restDaysSinceLastWorkout = Math.floor((today - lastWorkoutDate) / 86400000);
      }

      // Count consecutive training days
      let streak = 0;
      for (let i = 0; i < 14; i++) {
        const checkDate = new Date(today);
        checkDate.setDate(checkDate.getDate() - i);
        const dateStr = checkDate.toISOString().split("T")[0];
        if (workoutLog.some(w => w.date === dateStr)) streak++;
        else break;
      }
      insights.streakDays = streak;

      // Check if deload is due based on mesocycle week
      if (mesocycle && recovery.deloadEveryWeeks) {
        if (mesocycle.currentWeek >= recovery.deloadEveryWeeks && !mesocycle.deloadWeeks?.includes(mesocycle.currentWeek)) {
          insights.needsDeload = true;
          insights.deloadReasons.push("You've completed " + mesocycle.currentWeek + " weeks — " + recovery.deloadEveryWeeks + "-week deload cycle recommended for this program.");
        }
      }

      // Analyze recent feedback for deload signs
      const recentWorkouts = sortedLog.slice(0, 6);
      let lowPerformanceCount = 0;
      let highSorenessCount = 0;
      let highJointPainCount = 0;
      let lowPumpCount = 0;

      recentWorkouts.forEach(w => {
        w.exercises.forEach(ex => {
          if (ex.feedback) {
            if (ex.feedback.performance === 1) lowPerformanceCount++;
            if (ex.feedback.soreness >= 4) highSorenessCount++;
            if (ex.feedback.jointPain >= 3) highJointPainCount++;
            if (ex.feedback.pump <= 2) lowPumpCount++;
          }
        });
      });

      if (lowPerformanceCount >= 3) {
        insights.needsDeload = true;
        insights.deloadReasons.push("Performance declining — " + lowPerformanceCount + " exercises rated 'worse than last time' recently.");
      }
      if (highJointPainCount >= 2) {
        insights.needsDeload = true;
        insights.deloadReasons.push("Joint pain detected in " + highJointPainCount + " exercises — back off to protect joints.");
      }
      if (highSorenessCount >= 4) {
        insights.suggestions.push("High soreness in multiple muscles. Consider an extra rest day or reduce volume by 20%.");
      }
      if (lowPumpCount >= 3) {
        insights.suggestions.push("Pump quality is declining. Check hydration, sleep, and carb intake before training.");
      }

      // Streak warnings
      if (streak >= 5 && recovery.restDaysPerWeek >= 2) {
        insights.suggestions.push("You've trained " + streak + " days in a row. This program recommends " + recovery.restDaysPerWeek + " rest days per week — take a break.");
      }

      // Recovery tips from program data
      if (recovery.recoveryNotes) {
        insights.programTip = recovery.recoveryNotes;
      }

      // Deload protocol details
      if (insights.needsDeload) {
        insights.deloadProtocol = {
          volumeReduction: Math.round(recovery.deloadVolumeReduction * 100),
          intensityReduction: Math.round(recovery.deloadIntensityReduction * 100),
          duration: "1 week",
        };
      }

      return insights;
    }

    // ─── UTILITY FUNCTIONS ───────────────────────────────────────────────────
    const generateId = () => Math.random().toString(36).substr(2, 9);

    const getToday = () => {
      const d = new Date();
      return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
    };

    const getWeekStart = (dateStr) => {
      const d = new Date(dateStr + "T00:00:00");
      const day = d.getDay();
      const diff = d.getDate() - day + (day === 0 ? -6 : 1);
      const monday = new Date(d.setDate(diff));
      return `${monday.getFullYear()}-${String(monday.getMonth()+1).padStart(2,"0")}-${String(monday.getDate()).padStart(2,"0")}`;
    };

    const formatDate = (dateStr) => {
      const d = new Date(dateStr + "T00:00:00");
      return d.toLocaleDateString("en-US", { weekday: "short", month: "short", day: "numeric" });
    };

    const getTargetRIR = (week, isDeloadWeek) => {
      if (isDeloadWeek) return 8;
      if (week === 1) return 4;
      if (week === 2) return 3;
      if (week === 3) return 2;
      if (week === 4) return 1;
      return 0;
    };

    const getSuggestedLoad = (prevSets, week, isDeloadWeek) => {
      if (!prevSets || prevSets.length === 0) return { weight: null, reps: null };
      const last = prevSets[prevSets.length - 1];
      if (!last.weight || !last.reps) return { weight: null, reps: null };
      const targetRIR = getTargetRIR(week, isDeloadWeek);
      const actualRIR = last.actualRir || 0;
      let suggestedWeight = last.weight;
      let suggestedReps = last.reps;
      if (actualRIR > targetRIR + 1) {
        suggestedWeight = Math.ceil(last.weight * 1.025);
      }
      return { weight: suggestedWeight, reps: suggestedReps };
    };

    const filterByEquipment = (exercise, filter) => {
      if (filter === "full") return true;
      if (filter === "dumbbells") return exercise.equipment === "dumbbell" || exercise.equipment === "bodyweight";
      if (filter === "no_barbell") return exercise.equipment !== "barbell";
      if (filter === "machines") return exercise.equipment === "machine" || exercise.equipment === "bodyweight";
      return true;
    };

    const filterExercisesByEquipment = (exercises, filter) => {
      if (filter === "full") return exercises;
      return exercises.map(ex => {
        // Check equipment directly on the exercise first, then look up in EXERCISES library
        const equipTag = ex.equipment || Object.values(EXERCISES).flat().find(e => e.name === ex.exercise)?.equipment;
        if (!equipTag || filterByEquipment({ equipment: equipTag }, filter)) return ex;
        // Exercise doesn't pass filter — try to find a same-muscle replacement
        const sameMuscleMoptions = EXERCISES[ex.muscle]?.filter(e => filterByEquipment(e, filter)) || [];
        if (sameMuscleMoptions.length === 0) return null; // no replacement available, remove it
        const replacement = sameMuscleMoptions[Math.floor(Math.random() * sameMuscleMoptions.length)];
        return { ...ex, exercise: replacement.name, equipment: replacement.equipment };
      }).filter(Boolean);
    };

    // ─── EXERCISE FORM TIPS DATABASE ───────────────────────────────────────

    };

    // ─── ESTIMATED 1RM CALCULATOR ────────────────────────────────────────────
    const calculate1RM = (weight, reps) => {
      if (!weight || !reps || reps <= 0 || weight <= 0) return 0;
      if (reps === 1) return weight;
      // Epley formula
      return Math.round(weight * (1 + reps / 30));
    };

    const getExercise1RMHistory = (workoutLog, exerciseName) => {
      const history = [];
      workoutLog.forEach(w => {
        w.exercises.forEach(ex => {
          if (ex.name === exerciseName) {
            const doneSets = ex.sets.filter(s => s.done && s.weight > 0 && s.reps > 0);
            if (doneSets.length > 0) {
              const best1RM = Math.max(...doneSets.map(s => calculate1RM(s.weight, s.reps)));
              if (best1RM > 0) history.push({ date: w.date, e1rm: best1RM });
            }
          }
        });
      });
      return history;
    };

    // ─── PER-MUSCLE RECOVERY STATUS ──────────────────────────────────────────
    const computeMuscleRecovery = (workoutLog) => {
      const recovery = {};
      const now = new Date();
      const muscles = Object.keys(VOLUME_LANDMARKS);

      muscles.forEach(muscle => {
        let lastTrainedDate = null;
        let totalSetsLast = 0;
        let avgSoreness = 0;
        let sorenessCount = 0;

        // Find most recent workout for this muscle
        for (let i = workoutLog.length - 1; i >= 0; i--) {
          const w = workoutLog[i];
          const muscleExercises = w.exercises.filter(e => e.muscle === muscle);
          if (muscleExercises.length > 0) {
            if (!lastTrainedDate) {
              lastTrainedDate = w.date;
              totalSetsLast = muscleExercises.reduce((sum, e) => sum + e.sets.filter(s => s.done).length, 0);
            }
            muscleExercises.forEach(e => {
              if (e.feedback && e.feedback.soreness) {
                avgSoreness += e.feedback.soreness;
                sorenessCount++;
              }
            });
            if (sorenessCount >= 2) break; // enough data
          }
        }

        if (!lastTrainedDate) {
          recovery[muscle] = { status: "fresh", hours: 999, pct: 100, label: "Ready" };
          return;
        }

        const hoursSince = (now - new Date(lastTrainedDate + "T12:00:00")) / 3600000;
        const avgSore = sorenessCount > 0 ? avgSoreness / sorenessCount : 2;

        // Recovery model: base 48hrs, +12hrs per soreness point above 2, +6hrs per set above 10
        const baseRecoveryHrs = 48;
        const sorenessBonus = Math.max(0, (avgSore - 2)) * 12;
        const volumeBonus = Math.max(0, (totalSetsLast - 10)) * 6;
        const totalRecoveryNeeded = baseRecoveryHrs + sorenessBonus + volumeBonus;
        const pct = Math.min(100, Math.round((hoursSince / totalRecoveryNeeded) * 100));

        let status, label;
        if (pct >= 100) { status = "fresh"; label = "Recovered"; }
        else if (pct >= 70) { status = "recovering"; label = "Almost Ready"; }
        else if (pct >= 40) { status = "fatigued"; label = "Still Fatigued"; }
        else { status = "sore"; label = "Very Fatigued"; }

        recovery[muscle] = { status, hours: Math.round(hoursSince), pct, label, lastTrained: lastTrainedDate };
      });

      return recovery;
    };

    // ─── SMALL MUSCLES TO AUTO-REMOVE FROM DELOAD ────────────────────────────
    const DELOAD_REMOVE_MUSCLES = ["traps", "forearms", "calves", "abs"];
    const filterDeloadExercises = (exercises, isDeload) => {
      if (!isDeload) return exercises;
      return exercises.filter(ex => !DELOAD_REMOVE_MUSCLES.includes(ex.muscle));
    };

    // ─── HELPER FUNCTIONS ───────────────────────────────────────────────────
    const computeAutoAdjustments = (workoutLog, exerciseFeedback) => {
      const adjustments = {};
      const recentWorkouts = workoutLog.slice(-7);
      recentWorkouts.forEach(w => {
        w.exercises?.forEach(ex => {
          if (!adjustments[ex.muscle]) {
            adjustments[ex.muscle] = { volumeChange: 0, shouldRest: false, signals: [] };
          }
          const feedback = ex.feedback;
          if (!feedback) return;
          if (feedback.pump === 1 || feedback.pump === 2) {
            adjustments[ex.muscle].volumeChange = Math.max(adjustments[ex.muscle].volumeChange, 1);
            adjustments[ex.muscle].signals.push(`Low pump last session → consider +1 set`);
          }
          if (feedback.pump === 5) {
            adjustments[ex.muscle].volumeChange = Math.min(adjustments[ex.muscle].volumeChange, -1);
            adjustments[ex.muscle].signals.push(`Extreme pump detected → consider -1 set`);
          }
          if (feedback.soreness >= 4) {
            adjustments[ex.muscle].shouldRest = true;
            adjustments[ex.muscle].signals.push(`Heavy soreness → reduce volume`);
          }
          if (feedback.jointPain >= 3) {
            adjustments[ex.muscle].signals.push(`Joint pain → consider exercise swap`);
          }
        });
      });
      return adjustments;
    };

    function analyzeFatigue(workoutLog) {
      const result = {
        overall: 0, overallLabel: "Fresh", needsDeload: false, muscles: {}, exercises: {},
        recommendation: "",
      };
      if (workoutLog.length < 3) return result;

      const exerciseSessions = {};
      const muscleExercises = {};
      [...workoutLog].reverse().forEach(w => {
        w.exercises.forEach(ex => {
          if (!exerciseSessions[ex.name]) exerciseSessions[ex.name] = [];
          if (ex.muscle) {
            if (!muscleExercises[ex.muscle]) muscleExercises[ex.muscle] = new Set();
            muscleExercises[ex.muscle].add(ex.name);
          }
          const doneSets = ex.sets.filter(s => s.done && s.weight > 0 && s.reps > 0);
          if (doneSets.length === 0) return;
          exerciseSessions[ex.name].push({
            date: w.date, muscle: ex.muscle, plannedSets: ex.sets.length, completedSets: doneSets.length,
            maxWeight: Math.max(...doneSets.map(s => s.weight)),
            avgReps: doneSets.reduce((s, set) => s + set.reps, 0) / doneSets.length,
            volumeLoad: doneSets.reduce((s, set) => s + set.weight * set.reps, 0),
            topSetVolume: Math.max(...doneSets.map(s => s.weight * s.reps)),
          });
        });
      });

      Object.entries(exerciseSessions).forEach(([name, sessions]) => {
        if (sessions.length < 2) return;
        const recent = sessions.slice(0, 6);
        const signals = [];
        let score = 0;

        if (recent.length >= 3) {
          const last3 = recent.slice(0, 3);
          const sameOrHigherWeight = last3.every(s => s.maxWeight >= last3[2].maxWeight);
          if (sameOrHigherWeight) {
            const repTrend = last3[0].avgReps - last3[2].avgReps;
            if (repTrend < -1) {
              signals.push({ type: "rep_dropoff", severity: Math.min(Math.abs(repTrend) * 10, 30), message: `Reps dropping at ${last3[0].maxWeight} lbs` });
              score += Math.min(Math.abs(repTrend) * 10, 30);
            }
          }
        }

        if (recent.length >= 3) {
          const last3 = recent.slice(0, 3);
          const allSameWeight = last3.every(s => s.maxWeight === last3[0].maxWeight);
          const noRepGain = Math.abs(last3[0].avgReps - last3[2].avgReps) < 0.5;
          if (allSameWeight && noRepGain) {
            signals.push({ type: "stagnation", severity: 15, message: `Stuck at ${last3[0].maxWeight} lbs for 3 sessions` });
            score += 15;
          }
        }

        result.exercises[name] = {
          score: Math.min(score, 100), signals,
          muscle: sessions[0]?.muscle,
          sessions: recent.map(s => ({ date: s.date, volumeLoad: s.volumeLoad, avgReps: s.avgReps, maxWeight: s.maxWeight })),
        };
      });

      const muscleScores = {};
      Object.keys(VOLUME_LANDMARKS).forEach(muscle => {
        const exNames = muscleExercises[muscle] ? [...muscleExercises[muscle]] : [];
        const exScores = exNames.map(n => result.exercises[n]?.score || 0).filter(s => s > 0);
        const allSignals = exNames.flatMap(n => (result.exercises[n]?.signals || []).map(s => ({ ...s, exercise: n })));
        let muscleFatigue = exScores.length > 0 ? exScores.reduce((a, b) => a + b, 0) / exScores.length : 0;

        const lm = VOLUME_LANDMARKS[muscle];
        const recentWeeks = [];
        const now = new Date();
        for (let i = 0; i < 4; i++) {
          const d = new Date(now);
          d.setDate(d.getDate() - i * 7);
          const ws = getWeekStart(`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`);
          let weekSets = 0;
          workoutLog.filter(w => getWeekStart(w.date) === ws).forEach(w => {
            w.exercises.forEach(ex => {
              if (ex.muscle === muscle) weekSets += ex.sets.filter(s => s.done).length;
            });
          });
          recentWeeks.push(weekSets);
        }
        const weeksNearMRV = recentWeeks.filter(s => s >= lm.mav).length;
        if (weeksNearMRV >= 3) {
          muscleFatigue += 20;
          allSignals.push({ type: "sustained_high_volume", severity: 20, message: `At/above MAV for ${weeksNearMRV} of 4 weeks` });
        } else if (weeksNearMRV >= 2) {
          muscleFatigue += 10;
        }

        const weeksAtMRV = recentWeeks.filter(s => s >= lm.mrv).length;
        if (weeksAtMRV >= 2) {
          muscleFatigue += 15;
          allSignals.push({ type: "at_mrv", severity: 15, message: `At MRV for ${weeksAtMRV} weeks` });
        }

        muscleFatigue = Math.min(muscleFatigue, 100);
        muscleScores[muscle] = muscleFatigue;
        result.muscles[muscle] = {
          score: muscleFatigue,
          label: muscleFatigue >= 70 ? "Deload now" : muscleFatigue >= 50 ? "High fatigue" : muscleFatigue >= 30 ? "Moderate" : "Fresh",
          signals: allSignals,
          weeklyVolume: recentWeeks,
        };
      });

      const allMuscleScores = Object.values(muscleScores);
      const avgFatigue = allMuscleScores.length > 0 ? allMuscleScores.reduce((a, b) => a + b, 0) / allMuscleScores.length : 0;
      const maxFatigue = allMuscleScores.length > 0 ? Math.max(...allMuscleScores) : 0;
      result.overall = Math.round(avgFatigue * 0.4 + maxFatigue * 0.6);
      result.overallLabel = result.overall >= 70 ? "Deload now" : result.overall >= 50 ? "High fatigue" : result.overall >= 30 ? "Accumulating" : "Fresh";
      result.needsDeload = result.overall >= 60;

      const highMuscles = Object.entries(result.muscles).filter(([_, m]) => m.score >= 60).map(([name]) => name);
      if (result.needsDeload) {
        if (highMuscles.length >= 3) {
          result.recommendation = `Multiple muscle groups fatigued. Full deload week recommended.`;
        } else if (highMuscles.length > 0) {
          result.recommendation = `${highMuscles.join(" & ")} showing fatigue. Reduce volume.`;
        } else {
          result.recommendation = "Stress accumulating. Plan a lighter week soon.";
        }
      } else if (result.overall >= 40) {
        result.recommendation = "Fatigue building — you can push another week or two.";
      } else {
        result.recommendation = "Recovery looks good. Keep pushing.";
      }

      return result;
    }

    const calculateMesoSetTargets = (mesocycle, activeProgram, allPrograms) => {
      const targets = {};
      if (!mesocycle || !activeProgram) return targets;

      const progList = allPrograms || PROGRAMS;
      const prog = progList.find(p => p.id === activeProgram);
      if (!prog) return targets;

      const muscleExerciseCounts = {};
      Object.keys(VOLUME_LANDMARKS).forEach(m => muscleExerciseCounts[m] = 0);

      Object.values(prog.days).forEach(dayExercises => {
        dayExercises.forEach(ex => {
          if (muscleExerciseCounts[ex.muscle] !== undefined) {
            muscleExerciseCounts[ex.muscle]++;
          }
        });
      });

      Object.entries(muscleExerciseCounts).forEach(([muscle, exCount]) => {
        if (exCount === 0) return;
        const lm = VOLUME_LANDMARKS[muscle];
        targets[muscle] = {};

        for (let w = 1; w <= mesocycle.totalWeeks; w++) {
          const isDeloadWeek = mesocycle.deloadWeeks?.includes(w);
          if (isDeloadWeek) {
            targets[muscle][w] = Math.ceil(lm.mv * 0.75);
          } else if (w === mesocycle.totalWeeks - 1) {
            targets[muscle][w] = lm.mav;
          } else {
            const progress = w / (mesocycle.totalWeeks - 1);
            targets[muscle][w] = Math.round(lm.mv + (lm.mav - lm.mv) * progress);
          }
        }
      });

      return targets;
    };

    // ─── ADMIN PANEL ───────────────────────────────────────────────────────
    function AdminPanel({ currentUser, onClose }) {
      const [accounts, setAccounts] = useState(getAccounts());
      const [newUsername, setNewUsername] = useState("");
      const [newPin, setNewPin] = useState("");
      const [message, setMessage] = useState("");

      const refresh = () => setAccounts(getAccounts());

      const createAccount = () => {
        if (!newUsername.trim() || !newPin.trim()) {
          setMessage("Username and PIN required"); return;
        }
        if (newPin.length < 4) {
          setMessage("PIN must be at least 4 digits"); return;
        }
        const existing = accounts.find(a => a.username.toLowerCase() === newUsername.toLowerCase());
        if (existing) {
          setMessage("Username already exists"); return;
        }
        const updated = [...accounts, { username: newUsername.trim(), pin: newPin, isAdmin: false, createdAt: new Date().toISOString() }];
        saveAccounts(updated);
        setNewUsername(""); setNewPin("");
        setMessage("Account created!");
        refresh();
        setTimeout(() => setMessage(""), 2000);
      };

      const deleteAccount = (username) => {
        if (username === currentUser.username) return;
        const updated = accounts.filter(a => a.username !== username);
        saveAccounts(updated);
        // Also remove their data
        localStorage.removeItem("hypertrophy_user_" + username);
        refresh();
      };

      const toggleAdmin = (username) => {
        if (username === currentUser.username) return;
        const updated = accounts.map(a => a.username === username ? { ...a, isAdmin: !a.isAdmin } : a);
        saveAccounts(updated);
        refresh();
      };

      const resetPin = (username) => {
        const newPinVal = prompt("Enter new PIN for " + username + ":");
        if (newPinVal && newPinVal.length >= 4 && /^\d+$/.test(newPinVal)) {
          const updated = accounts.map(a => a.username === username ? { ...a, pin: newPinVal } : a);
          saveAccounts(updated);
          refresh();
        }
      };

      return (
        <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.85)", zIndex: 300, overflow: "auto", padding: 16 }}>
          <div style={{ maxWidth: 500, margin: "0 auto", paddingTop: 20, paddingBottom: 40 }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 24 }}>
              <div style={{ fontSize: 20, fontWeight: 700, color: "#fff" }}>Admin Panel</div>
              <button onClick={onClose} style={{ background: "none", border: "none", color: "#888", fontSize: 24, cursor: "pointer", padding: 8 }}>×</button>
            </div>

            <Card>
              <div style={{ fontSize: 14, fontWeight: 600, color: "#fff", marginBottom: 16 }}>Create New Account</div>
              <div style={{ display: "flex", gap: 8, marginBottom: 8 }}>
                <input
                  type="text" value={newUsername}
                  onChange={(e) => setNewUsername(e.target.value)}
                  placeholder="Username"
                  style={{
                    flex: 1, background: "#0f0f0f", color: "#fff", border: "1px solid #333",
                    padding: "10px", borderRadius: 6, fontSize: 14,
                  }}
                />
                <input
                  type="text" value={newPin} inputMode="numeric" maxLength={6}
                  onChange={(e) => setNewPin(e.target.value.replace(/\D/g, ""))}
                  placeholder="PIN"
                  style={{
                    width: 80, background: "#0f0f0f", color: "#fff", border: "1px solid #333",
                    padding: "10px", borderRadius: 6, fontSize: 14, letterSpacing: "0.2em",
                  }}
                />
              </div>
              <button
                onClick={createAccount}
                style={{
                  width: "100%", padding: "10px", background: "#10b981", border: "none",
                  borderRadius: 6, color: "#fff", fontSize: 14, fontWeight: 600, cursor: "pointer",
                  minHeight: 40, touchAction: "manipulation",
                }}
              >
                <Icon name="plus" size={14} color="#fff" /> Create Account
              </button>
              {message && <div style={{ marginTop: 8, fontSize: 12, color: message.includes("!") ? "#10b981" : "#ef4444", textAlign: "center" }}>{message}</div>}
            </Card>

            <Card>
              <div style={{ fontSize: 14, fontWeight: 600, color: "#fff", marginBottom: 16 }}>Accounts ({accounts.length})</div>
              {accounts.map(acc => (
                <div key={acc.username} style={{
                  display: "flex", justifyContent: "space-between", alignItems: "center",
                  padding: "10px 0", borderBottom: "1px solid #222",
                }}>
                  <div>
                    <div style={{ fontSize: 14, color: "#fff", fontWeight: 500 }}>
                      {acc.username}
                      {acc.isAdmin && <span style={{ fontSize: 10, color: "#f59e0b", marginLeft: 8, background: "#2a2000", padding: "2px 6px", borderRadius: 4 }}>ADMIN</span>}
                      {acc.username === currentUser.username && <span style={{ fontSize: 10, color: "#10b981", marginLeft: 8 }}>(you)</span>}
                    </div>
                    <div style={{ fontSize: 11, color: "#666", marginTop: 2 }}>
                      PIN: {acc.pin} • Created {new Date(acc.createdAt).toLocaleDateString()}
                    </div>
                  </div>
                  {acc.username !== currentUser.username && (
                    <div style={{ display: "flex", gap: 6 }}>
                      <button
                        onClick={() => toggleAdmin(acc.username)}
                        title={acc.isAdmin ? "Remove admin" : "Make admin"}
                        style={{
                          background: "#222", border: "none", color: acc.isAdmin ? "#f59e0b" : "#888",
                          padding: "6px 8px", borderRadius: 4, fontSize: 10, cursor: "pointer",
                          minHeight: 32, touchAction: "manipulation",
                        }}
                      >
                        {acc.isAdmin ? "Demote" : "Admin"}
                      </button>
                      <button
                        onClick={() => resetPin(acc.username)}
                        style={{
                          background: "#222", border: "none", color: "#888",
                          padding: "6px 8px", borderRadius: 4, fontSize: 10, cursor: "pointer",
                          minHeight: 32, touchAction: "manipulation",
                        }}
                      >
                        Reset PIN
                      </button>
                      <button
                        onClick={() => deleteAccount(acc.username)}
                        style={{
                          background: "#2a0000", border: "none", color: "#ef4444",
                          padding: "6px 8px", borderRadius: 4, fontSize: 10, cursor: "pointer",
                          minHeight: 32, touchAction: "manipulation",

                      >
                        Delete
                      </button>
                    </div>
                  )}
                </div>
              ))}
            </Card>
          </div>
        </div>
      );
    }

    // ─── MAIN APP COMPONENT ─────────────────────────────────────────────────
    function HypertrophyApp() {
      // Auth state
      const [currentUser, setCurrentUser] = useState(() => {
        const savedSession = localStorage.getItem(ACTIVE_SESSION_KEY);
        if (savedSession) {
          const accounts = getAccounts();
          return accounts.find(a => a.username === savedSession) || null;
        }
        return null;
      });
      const [showAdmin, setShowAdmin] = useState(false);

      // Load user data from localStorage
      const loadUserState = (username) => {
        const data = getUserData(username);
        return {
          workoutLog: data.workoutLog || [],
          activeProgram: data.activeProgram || null,
          mesocycle: data.mesocycle || null,
          equipmentFilter: data.equipmentFilter || "full",
          customPrograms: data.customPrograms || [],
          schedule: data.schedule || null,
        };
      };

      const initialState = currentUser ? loadUserState(currentUser.username) : { workoutLog: [], activeProgram: null, mesocycle: null, equipmentFilter: "full", customPrograms: [], schedule: null };

      const [activeTab, setActiveTab] = useState("dashboard");
      const [workoutLog, setWorkoutLog] = useState(initialState.workoutLog);
      const [activeProgram, setActiveProgram] = useState(initialState.activeProgram);
      const [mesocycle, setMesocycle] = useState(initialState.mesocycle);
      const [currentWorkout, setCurrentWorkout] = useState(null);
      const [equipmentFilter, setEquipmentFilter] = useState(initialState.equipmentFilter);
      const [customPrograms, setCustomPrograms] = useState(initialState.customPrograms);
      const [schedule, setSchedule] = useState(initialState.schedule);
      const [showScheduleSetup, setShowScheduleSetup] = useState(false);
      const [pendingProgramId, setPendingProgramId] = useState(null);

      // Auto-save to localStorage whenever state changes
      useEffect(() => {
        if (!currentUser) return;
        saveUserData(currentUser.username, { workoutLog, activeProgram, mesocycle, equipmentFilter, customPrograms, schedule });
      }, [workoutLog, activeProgram, mesocycle, equipmentFilter, customPrograms, schedule, currentUser]);

      const handleLogin = (account) => {
        setCurrentUser(account);
        const data = loadUserState(account.username);
        setWorkoutLog(data.workoutLog);
        setActiveProgram(data.activeProgram);
        setMesocycle(data.mesocycle);
        setEquipmentFilter(data.equipmentFilter);
        setCustomPrograms(data.customPrograms);
        setSchedule(data.schedule);
        setCurrentWorkout(null);
        setActiveTab("dashboard");
      };

      const handleLogout = () => {
        localStorage.removeItem(ACTIVE_SESSION_KEY);
        setCurrentUser(null);
        setWorkoutLog([]);
        setActiveProgram(null);
        setMesocycle(null);
        setCurrentWorkout(null);
        setEquipmentFilter("full");
        setCustomPrograms([]);
        setSchedule(null);
      };

      // Helper: get today's scheduled workout based on schedule type
      const getTodaysSchedule = () => {
        if (!schedule || !activeProgram) return null;
        const allProgs = [...PROGRAMS, ...(customPrograms || [])];
        const prog = allProgs.find(p => p.id === activeProgram);
        if (!prog) return null;

        if (schedule.type === "weekly") {
          const dayOfWeek = new Date().getDay(); // 0=Sun, 1=Mon, ...
          const dayName = schedule.mapping[dayOfWeek];
          if (!dayName || dayName === "Rest") return { isRest: true, dayName: "Rest Day" };
          if (prog.days[dayName]) return { isRest: false, dayName, exercises: prog.days[dayName] };
          return { isRest: true, dayName: "Rest Day" };
        }

        if (schedule.type === "sequential") {
          const nextIdx = ((schedule.lastCompletedIndex ?? -1) + 1) % prog.split.length;
          const dayName = prog.split[nextIdx];
          return { isRest: false, dayName, exercises: prog.days[dayName], splitIndex: nextIdx };
        }

        return null;
      };

      // Advance sequential schedule after finishing a workout
      const advanceSchedule = (dayName) => {
        if (!schedule || schedule.type !== "sequential" || !activeProgram) return;
        const allProgs = [...PROGRAMS, ...(customPrograms || [])];
        const prog = allProgs.find(p => p.id === activeProgram);
        if (!prog) return;
        const idx = prog.split.indexOf(dayName);
        if (idx !== -1) {
          setSchedule(prev => ({ ...prev, lastCompletedIndex: idx }));
        }
      };

      if (!currentUser) {
        return <LoginScreen onLogin={handleLogin} />;
      }

      const weeklyVolume = useMemo(() => {
        const thisWeek = getWeekStart(getToday());
        const vol = {};
        Object.keys(VOLUME_LANDMARKS).forEach(m => vol[m] = 0);
        workoutLog.filter(w => getWeekStart(w.date) === thisWeek).forEach(w => {
          w.exercises.forEach(ex => {
            if (ex.muscle && vol[ex.muscle] !== undefined) {
              vol[ex.muscle] += ex.sets.filter(s => s.done).length;
            }
          });
        });
        return vol;
      }, [workoutLog]);

      const fatigueData = useMemo(() => analyzeFatigue(workoutLog), [workoutLog]);
      const recoveryInsights = useMemo(() => computeRecoveryInsights(workoutLog, activeProgram, mesocycle, schedule), [workoutLog, activeProgram, mesocycle, schedule]);
      const allProgramsCombined = useMemo(() => [...PROGRAMS, ...(customPrograms || [])], [customPrograms]);
      const mesoSetTargets = useMemo(() => calculateMesoSetTargets(mesocycle, activeProgram, allProgramsCombined), [mesocycle, activeProgram, allProgramsCombined]);

      const tabs = [
        { id: "dashboard", label: "Dashboard", icon: "flame" },
        { id: "workout", label: "Train", icon: "dumbbell" },
        { id: "programs", label: "Programs", icon: "target" },
        { id: "volume", label: "Volume", icon: "trending-up" },
        { id: "mesocycle", label: "Meso", icon: "calendar" },
        { id: "history", label: "History", icon: "clock" },
      ];

      return (
        <div style={{ minHeight: "100vh", background: "#0a0a0a", color: "#e5e5e5" }}>
          <div style={{ background: "linear-gradient(135deg, #111 0%, #1a1a1a 100%)", borderBottom: "1px solid #222", padding: "12px 16px", display: "flex", alignItems: "center", gap: 10 }}>
            <img src="logo.png" alt="BENT" style={{ width: 36, height: 36, borderRadius: 10, objectFit: "cover", flexShrink: 0 }}
              onError={(e) => { e.target.onerror = null; e.target.style.display = "none"; }}
            />
            <div style={{ flex: 1, minWidth: 0 }}>
              <div style={{ fontSize: 18, fontWeight: 900, color: "#fff", letterSpacing: "-0.02em" }}>BENT</div>
              <div style={{ fontSize: 10, color: "#22c55e" }}>{currentUser.username}{currentUser.isAdmin && " · Admin"}</div>
            </div>
            <div style={{ display: "flex", gap: 6, flexShrink: 0 }}>
              {currentUser.isAdmin && (
                <button
                  onClick={() => setShowAdmin(true)}
                  style={{
                    background: "#1a1a2e", border: "none", color: "#818cf8", padding: "6px 10px",
                    borderRadius: 6, fontSize: 11, fontWeight: 600, cursor: "pointer",
                    minHeight: 32, touchAction: "manipulation",
                  }}
                >
                  <Icon name="settings" size={14} color="#818cf8" />
                </button>
              )}
              <button
                onClick={handleLogout}
                style={{
                  background: "#1a0a0a", border: "none", color: "#ef4444", padding: "6px 10px",
                  borderRadius: 6, fontSize: 11, fontWeight: 600, cursor: "pointer",
                  minHeight: 32, touchAction: "manipulation",
                }}
              >
                Logout
              </button>
            </div>
          </div>

          <div style={{ maxWidth: 600, margin: "0 auto", padding: "0 12px 80px" }}>
            {activeTab === "dashboard" && (
              <DashboardView
                workoutLog={workoutLog} weeklyVolume={weeklyVolume} activeProgram={activeProgram}
                mesocycle={mesocycle} fatigueData={fatigueData} mesoSetTargets={mesoSetTargets}
                onStartWorkout={() => setActiveTab("workout")}
                todaysSchedule={getTodaysSchedule()} schedule={schedule}
                recoveryInsights={recoveryInsights}
              />
            )}
            {activeTab === "workout" && (
              <WorkoutView
                workoutLog={workoutLog} setWorkoutLog={setWorkoutLog} activeProgram={activeProgram}
                currentWorkout={currentWorkout} setCurrentWorkout={setCurrentWorkout} mesocycle={mesocycle}
                setMesocycle={setMesocycle} equipmentFilter={equipmentFilter}
                customPrograms={customPrograms}
                todaysSchedule={getTodaysSchedule()} schedule={schedule} advanceSchedule={advanceSchedule}
              />
            )}
            {activeTab === "programs" && (
              <ProgramsView
                activeProgram={activeProgram} setActiveProgram={setActiveProgram}
                setMesocycle={setMesocycle} equipmentFilter={equipmentFilter}
                setEquipmentFilter={setEquipmentFilter}
                setActiveTab={setActiveTab}
                setCurrentWorkout={setCurrentWorkout}
                customPrograms={customPrograms} setCustomPrograms={setCustomPrograms}
                onStartProgram={(progId) => { setPendingProgramId(progId); setShowScheduleSetup(true); }}
              />
            )}
            {activeTab === "volume" && (
              <VolumeView weeklyVolume={weeklyVolume} workoutLog={workoutLog} fatigueData={fatigueData} mesoSetTargets={mesoSetTargets} />
            )}
            {activeTab === "mesocycle" && (
              <MesocycleView
                mesocycle={mesocycle} setMesocycle={setMesocycle} workoutLog={workoutLog}
                activeProgram={activeProgram} fatigueData={fatigueData} mesoSetTargets={mesoSetTargets}
              />
            )}
            {activeTab === "history" && (
              <HistoryView workoutLog={workoutLog} setWorkoutLog={setWorkoutLog} />
            )}
          </div>

          <div style={{ position: "fixed", bottom: 0, left: 0, right: 0, background: "#111", borderTop: "1px solid #222", display: "flex", justifyContent: "center", padding: "6px 0 env(safe-area-inset-bottom, 8px)", zIndex: 100 }}>
            <div style={{ display: "flex", maxWidth: 600, width: "100%", touchAction: "manipulation" }}>
              {tabs.map(tab => (
                <button
                  key={tab.id}
                  onClick={() => setActiveTab(tab.id)}
                  style={{
                    flex: 1, display: "flex", flexDirection: "column", alignItems: "center", gap: 2,
                    padding: "8px 0", background: "none", border: "none", cursor: "pointer",
                    color: activeTab === tab.id ? "#22c55e" : "#555",
                    fontSize: 10, fontWeight: activeTab === tab.id ? 600 : 400,
                    transition: "color 0.2s", minHeight: 44, justifyContent: "center",
                    touchAction: "manipulation",
                  }}
                >
                  <Icon name={tab.icon} size={18} />
                  {tab.label}
                </button>
              ))}
            </div>
          </div>

          {showAdmin && <AdminPanel currentUser={currentUser} onClose={() => setShowAdmin(false)} />}

          {showScheduleSetup && pendingProgramId && (() => {
            const allProgs = [...PROGRAMS, ...(customPrograms || [])];
            const prog = allProgs.find(p => p.id === pendingProgramId);
            if (!prog) return null;
            return (
              <ScheduleSetup
                program={prog}
                onSave={(sched) => {
                  setSchedule(sched);
                  setActiveProgram(pendingProgramId);
                  setCurrentWorkout(null);
                  const recovery = PROGRAM_RECOVERY[pendingProgramId];
                  const mesoLen = recovery ? recovery.mesoLength : 4;
                  setMesocycle({ id: generateId(), totalWeeks: mesoLen, currentWeek: 1, deloadWeeks: [mesoLen] });
                  setShowScheduleSetup(false);
                  setPendingProgramId(null);
                  setActiveTab("workout");
                }}
                onCancel={() => {
                  setShowScheduleSetup(false);
                  setPendingProgramId(null);
                }}
              />
            );
          })()}
        </div>
      );
    }

    // ─── WARM-UP PROTOCOL COMPONENT ─────────────────────────────────────────
    function WarmUpGuide({ exerciseName, onDone }) {
      const [step, setStep] = useState(0);
      const steps = [
        { label: "Light Set", reps: 12, desc: "~30-rep max weight. Easy, get blood flowing.", rest: "60s rest" },
        { label: "Medium Set", reps: 8, desc: "~20-rep max weight. Start feeling the muscle.", rest: "60s rest" },
        { label: "Heavy Warm-up", reps: 4, desc: "~10-rep max weight. Prime the movement pattern.", rest: "60-90s rest" },
      ];

      return (
        <Card style={{ border: "1px solid #f59e0b33", background: "rgba(245,158,11,0.05)" }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>
            <div>
              <div style={{ fontSize: 11, color: "#f59e0b", textTransform: "uppercase", letterSpacing: 1 }}>Warm-Up Protocol</div>
              <div style={{ fontSize: 14, fontWeight: 600, color: "#fff", marginTop: 2 }}>{exerciseName}</div>
            </div>
            <button onClick={onDone} style={{ background: "none", border: "1px solid #333", color: "#888", padding: "6px 12px", borderRadius: 6, fontSize: 12, cursor: "pointer", minHeight: 32, touchAction: "manipulation" }}>
              Skip
            </button>
          </div>
          {steps.map((s, i) => (
            <div key={i} style={{ display: "flex", alignItems: "center", gap: 10, padding: "8px 0", opacity: i < step ? 0.4 : 1, borderBottom: i < steps.length - 1 ? "1px solid #1f1f1f" : "none" }}>
              <div style={{
                width: 28, height: 28, borderRadius: "50%", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 12, fontWeight: 700,
                background: i < step ? "#22c55e" : i === step ? "#f59e0b22" : "#1a1a1a",
                color: i < step ? "#fff" : i === step ? "#f59e0b" : "#555",
                border: i === step ? "1px solid #f59e0b" : "1px solid transparent",
              }}>
                {i < step ? "✓" : i + 1}
              </div>
              <div style={{ flex: 1 }}>
                <div style={{ fontSize: 13, fontWeight: 600, color: i <= step ? "#fff" : "#555" }}>{s.label} — {s.reps} reps</div>
                <div style={{ fontSize: 11, color: "#888" }}>{s.desc}</div>
              </div>
              {i === step && (
                <button onClick={() => { if (step < steps.length - 1) setStep(step + 1); else onDone(); }}
                  style={{ background: "#f59e0b", color: "#000", border: "none", padding: "6px 14px", borderRadius: 6, fontSize: 12, fontWeight: 600, cursor: "pointer", minHeight: 32, touchAction: "manipulation" }}>
                  Done
                </button>
              )}
            </div>
          ))}
          {step >= steps.length && (
            <button onClick={onDone} style={{ width: "100%", background: "#22c55e", color: "#fff", border: "none", padding: "10px", borderRadius: 8, fontSize: 14, fontWeight: 600, cursor: "pointer", marginTop: 8, minHeight: 44, touchAction: "manipulation" }}>
              Start Working Sets
            </button>
          )}
        </Card>
      );
    }

    // ─── SESSION SUMMARY MODAL ────────────────────────────────────────────────
    function SessionSummary({ workout, workoutLog, onClose }) {
      const [sessionRating, setSessionRating] = useState(3);
      const [sessionNotes, setSessionNotes] = useState("");
      const duration = workout.duration || Math.round((Date.now() - workout.startTime) / 60000);
      const totalSets = workout.exercises.reduce((sum, e) => sum + e.sets.filter(s => s.done).length, 0);
      const totalVolume = workout.exercises.reduce((sum, e) => sum + e.sets.filter(s => s.done).reduce((v, s) => v + (s.weight || 0) * (s.reps || 0), 0), 0);
      const musclesHit = [...new Set(workout.exercises.map(e => e.muscle).filter(Boolean))];

      // Calculate 1RM PRs from this session
      const prs = [];
      workout.exercises.forEach(ex => {
        const best1RM = Math.max(...ex.sets.filter(s => s.done && s.weight > 0 && s.reps > 0).map(s => calculate1RM(s.weight, s.reps)), 0);
        if (best1RM > 0) {
          const history = getExercise1RMHistory(workoutLog, ex.name);
          const prevBest = history.length > 0 ? Math.max(...history.map(h => h.e1rm)) : 0;
          if (best1RM > prevBest && prevBest > 0) {
            prs.push({ name: ex.name, e1rm: best1RM, prev: prevBest });
          }
        }
      });

      const ratingLabels = ["", "Terrible", "Below Average", "Average", "Great", "Amazing"];
      const ratingColors = ["", "#ef4444", "#f59e0b", "#888", "#22c55e", "#10b981"];

      return (
        <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.9)", zIndex: 200, display: "flex", alignItems: "center", justifyContent: "center", padding: 16 }}>
          <div style={{ background: "#1a1a1a", borderRadius: 16, padding: 24, maxWidth: 400, width: "100%", maxHeight: "85vh", overflowY: "auto" }}>
            <div style={{ textAlign: "center", marginBottom: 16 }}>
              <div style={{ fontSize: 40, marginBottom: 4 }}>💪</div>
              <div style={{ fontSize: 20, fontWeight: 700, color: "#fff" }}>Workout Complete!</div>
              <div style={{ fontSize: 14, color: "#888", marginTop: 4 }}>{workout.dayName} — {duration} min</div>
            </div>

            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 8, marginBottom: 16 }}>
              <div style={{ background: "#0f0f0f", borderRadius: 10, padding: 12, textAlign: "center" }}>
                <div style={{ fontSize: 22, fontWeight: 700, color: "#22c55e" }}>{totalSets}</div>
                <div style={{ fontSize: 10, color: "#888" }}>Sets</div>
              </div>
              <div style={{ background: "#0f0f0f", borderRadius: 10, padding: 12, textAlign: "center" }}>
                <div style={{ fontSize: 22, fontWeight: 700, color: "#818cf8" }}>{musclesHit.length}</div>
                <div style={{ fontSize: 10, color: "#888" }}>Muscles</div>
              </div>
              <div style={{ background: "#0f0f0f", borderRadius: 10, padding: 12, textAlign: "center" }}>
                <div style={{ fontSize: 22, fontWeight: 700, color: "#f59e0b" }}>{totalVolume > 1000 ? Math.round(totalVolume / 1000) + "k" : totalVolume}</div>
                <div style={{ fontSize: 10, color: "#888" }}>Volume (lbs)</div>
              </div>
            </div>

            {prs.length > 0 && (
              <Card style={{ border: "1px solid #22c55e44", background: "rgba(34,197,94,0.05)" }}>
                <div style={{ fontSize: 13, fontWeight: 700, color: "#22c55e", marginBottom: 6 }}>🏆 New Estimated 1RM PRs!</div>
                {prs.map((pr, i) => (
                  <div key={i} style={{ fontSize: 12, color: "#ccc", marginBottom: 4 }}>
                    {pr.name}: {pr.e1rm} lbs (was {pr.prev})
                  </div>
                ))}
              </Card>
            )}

            <div style={{ marginBottom: 16 }}>
              <div style={{ fontSize: 13, fontWeight: 600, color: "#fff", marginBottom: 8 }}>How was this session?</div>
              <div style={{ display: "flex", gap: 6 }}>
                {[1, 2, 3, 4, 5].map(r => (
                  <button key={r} onClick={() => setSessionRating(r)} style={{
                    flex: 1, padding: "10px 0", borderRadius: 8, border: sessionRating === r ? `2px solid ${ratingColors[r]}` : "1px solid #333",
                    background: sessionRating === r ? `${ratingColors[r]}22` : "#0f0f0f", color: sessionRating === r ? ratingColors[r] : "#555",
                    fontSize: 18, cursor: "pointer", minHeight: 44, touchAction: "manipulation",
                  }}>
                    {r}
                  </button>
                ))}
              </div>
              <div style={{ textAlign: "center", fontSize: 12, color: ratingColors[sessionRating], marginTop: 4 }}>{ratingLabels[sessionRating]}</div>
            </div>

            <button onClick={() => onClose(sessionRating, sessionNotes)} style={{
              width: "100%", background: "linear-gradient(135deg, #22c55e, #16a34a)", color: "#fff", border: "none",
              padding: "14px", borderRadius: 8, fontSize: 16, fontWeight: 700, cursor: "pointer", minHeight: 48, touchAction: "manipulation",
            }}>
              Save & Close
            </button>
          </div>
        </div>
      );
    }

    // ─── MUSCLE RECOVERY STATUS COMPONENT ────────────────────────────────────

      const recovery = useMemo(() => computeMuscleRecovery(workoutLog), [workoutLog]);
      const statusColors = { fresh: "#22c55e", recovering: "#f59e0b", fatigued: "#ef4444", sore: "#dc2626" };

      return (

    // ─── SCHEDULE SETUP MODAL ────────────────────────────────────────────────
    function ScheduleSetup({ program, onSave, onCancel }) {
      const DAY_NAMES = ["Sunday", "Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday"];
      const [scheduleType, setScheduleType] = useState(null);
      const [weeklyMapping, setWeeklyMapping] = useState({
        0: "Rest", 1: "Rest", 2: "Rest", 3: "Rest", 4: "Rest", 5: "Rest", 6: "Rest"
      });

      // Auto-fill weekly mapping from program recovery data or split
      const autoFill = () => {
        const recovery = PROGRAM_RECOVERY[program.id];
        if (recovery && recovery.weeklySchedule) {
          // Use the researched recommended schedule
          const newMapping = {};
          Object.keys(recovery.weeklySchedule).forEach(k => {
            newMapping[k] = recovery.weeklySchedule[k];
          });
          setWeeklyMapping(newMapping);
        } else {
          // Fallback: fill from split starting Monday
          const newMapping = { 0: "Rest", 1: "Rest", 2: "Rest", 3: "Rest", 4: "Rest", 5: "Rest", 6: "Rest" };
          const workDays = [1, 2, 3, 4, 5, 6, 0];
          let dayIdx = 0;
          for (let i = 0; i < program.split.length && dayIdx < workDays.length; i++) {
            newMapping[workDays[dayIdx]] = program.split[i];
            dayIdx++;
          }
          setWeeklyMapping(newMapping);
        }
      };

      if (!scheduleType) {
        return (
          <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.85)", zIndex: 200, display: "flex", alignItems: "center", justifyContent: "center", padding: 16 }}>
            <div style={{ background: "#1a1a1a", borderRadius: 16, padding: 24, maxWidth: 400, width: "100%" }}>
              <div style={{ fontSize: 18, fontWeight: 700, color: "#fff", marginBottom: 4 }}>Schedule Your Workouts</div>
              <div style={{ fontSize: 13, color: "#888", marginBottom: 20 }}>{program.name} — {program.daysPerWeek} days/week</div>

              <Card style={{ cursor: "pointer", border: "1px solid #333" }} onClick={() => setScheduleType("weekly")}>
                <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
                  <div style={{ width: 40, height: 40, borderRadius: 10, background: "rgba(34,197,94,0.15)", display: "flex", alignItems: "center", justifyContent: "center" }}>
                    <Icon name="calendar" size={20} color="#22c55e" />
                  </div>
                  <div>
                    <div style={{ fontSize: 15, fontWeight: 600, color: "#fff" }}>Weekly Schedule</div>
                    <div style={{ fontSize: 12, color: "#888", marginTop: 2 }}>Assign workouts to specific weekdays</div>
                  </div>
                </div>
              </Card>

              <Card style={{ cursor: "pointer", border: "1px solid #333" }} onClick={() => {
                onSave({ type: "sequential", lastCompletedIndex: -1 });
              }}>
                <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
                  <div style={{ width: 40, height: 40, borderRadius: 10, background: "rgba(99,102,241,0.15)", display: "flex", alignItems: "center", justifyContent: "center" }}>
                    <Icon name="trending-up" size={20} color="#818cf8" />
                  </div>
                  <div>
                    <div style={{ fontSize: 15, fontWeight: 600, color: "#fff" }}>Sequential</div>
                    <div style={{ fontSize: 12, color: "#888", marginTop: 2 }}>Just follow the order — do the next workout whenever you train</div>
                  </div>
                </div>
              </Card>

              <button onClick={onCancel} style={{ width: "100%", background: "none", border: "1px solid #333", color: "#888", padding: "10px", borderRadius: 8, fontSize: 14, cursor: "pointer", marginTop: 8, minHeight: 44, touchAction: "manipulation" }}>
                Cancel
              </button>
            </div>
          </div>
        );
      }

      // Weekly assignment UI
      return (
        <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.85)", zIndex: 200, display: "flex", alignItems: "center", justifyContent: "center", padding: 16 }}>
          <div style={{ background: "#1a1a1a", borderRadius: 16, padding: 24, maxWidth: 400, width: "100%", maxHeight: "80vh", overflowY: "auto" }}>
            <div style={{ fontSize: 18, fontWeight: 700, color: "#fff", marginBottom: 4 }}>Weekly Schedule</div>
            <div style={{ fontSize: 13, color: "#888", marginBottom: 12 }}>Assign a workout to each day of the week</div>

            <button onClick={autoFill} style={{ background: "rgba(34,197,94,0.15)", border: "1px solid #22c55e33", color: "#22c55e", padding: "8px 14px", borderRadius: 8, fontSize: 12, fontWeight: 600, cursor: "pointer", marginBottom: 16, minHeight: 36, touchAction: "manipulation" }}>
              Auto-fill
            </button>

            {DAY_NAMES.map((dayLabel, dayIdx) => (
              <div key={dayIdx} style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 10 }}>
                <div style={{ width: 80, fontSize: 13, color: "#ccc", fontWeight: 500 }}>{dayLabel}</div>
                <select
                  value={weeklyMapping[dayIdx]}
                  onChange={(e) => setWeeklyMapping(prev => ({ ...prev, [dayIdx]: e.target.value }))}
                  style={{ flex: 1, background: "#0f0f0f", color: "#fff", border: "1px solid #333", borderRadius: 8, padding: "8px 10px", fontSize: 14, minHeight: 40 }}
                >
                  <option value="Rest">Rest Day</option>
                  {[...new Set(program.split)].map(dayName => (
                    <option key={dayName} value={dayName}>{dayName}</option>
                  ))}
                </select>
              </div>
            ))}

            <div style={{ display: "flex", gap: 8, marginTop: 16 }}>
              <button onClick={() => setScheduleType(null)} style={{ flex: 1, background: "none", border: "1px solid #333", color: "#888", padding: "10px", borderRadius: 8, fontSize: 14, cursor: "pointer", minHeight: 44, touchAction: "manipulation" }}>
                Back
              </button>
              <button onClick={() => onSave({ type: "weekly", mapping: weeklyMapping })} style={{ flex: 1, background: "#22c55e", color: "#fff", border: "none", padding: "10px", borderRadius: 8, fontSize: 14, fontWeight: 600, cursor: "pointer", minHeight: 44, touchAction: "manipulation" }}>
                Save Schedule
              </button>
            </div>
          </div>
        </div>
      );
    }

    // ─── DASHBOARD VIEW ─────────────────────────────────────────────────────
    function DashboardView({ workoutLog, weeklyVolume, activeProgram, mesocycle, fatigueData, mesoSetTargets, onStartWorkout, todaysSchedule, schedule, recoveryInsights }) {
      const today = getToday();
      const thisWeek = getWeekStart(today);
      const workoutsThisWeek = workoutLog.filter(w => getWeekStart(w.date) === thisWeek).length;
      const alreadyTrainedToday = workoutLog.some(w => w.date === today);

      const overloadAlerts = useMemo(() => {
        const alerts = [];
        const exerciseHistory = {};
        workoutLog.slice().reverse().forEach(w => {
          w.exercises.forEach(ex => {
            if (!exerciseHistory[ex.name]) exerciseHistory[ex.name] = [];
            const completedSets = ex.sets.filter(s => s.done);
            if (completedSets.length > 0) {
              exerciseHistory[ex.name].push({
                date: w.date, maxWeight: Math.max(...completedSets.map(s => s.weight || 0)),
                totalVolume: completedSets.reduce((sum, s) => sum + (s.weight || 0) * (s.reps || 0), 0),
                avgReps: completedSets.reduce((sum, s) => sum + (s.reps || 0), 0) / completedSets.length,
              });
            }
          });
        });
        Object.entries(exerciseHistory).forEach(([name, history]) => {
          if (history.length >= 3) {
            const last3 = history.slice(0, 3);
            const allSameWeight = last3.every(h => h.maxWeight === last3[0].maxWeight);
            const repsIncreasing = last3[0].avgReps > last3[2].avgReps;
            if (allSameWeight && repsIncreasing) {
              alerts.push({ exercise: name, weight: last3[0].maxWeight, message: `Ready to increase on ${name}!` });
            }
          }
        });
        return alerts.slice(0, 3);
      }, [workoutLog]);

      const volumeAlerts = useMemo(() => {
        const alerts = [];
        Object.entries(weeklyVolume).forEach(([muscle, sets]) => {
          const lm = VOLUME_LANDMARKS[muscle];
          if (sets >= lm.mrv) {
            alerts.push({ muscle, type: "over", message: `${muscle} at MRV. Consider a deload.` });
          } else if (sets < lm.mv && workoutsThisWeek >= 3) {
            alerts.push({ muscle, type: "under", message: `${muscle} below MV. Add more sets.` });
          }
        });
        return alerts.slice(0, 3);
      }, [weeklyVolume, workoutsThisWeek]);

      const autoAdjustments = useMemo(() => computeAutoAdjustments(workoutLog, {}), [workoutLog]);

      const DAY_NAMES_SHORT = ["Sun", "Mon", "Tue", "Wed", "Thu", "Fri", "Sat"];

      return (
        <div style={{ paddingTop: 16 }}>
          <div style={{ fontSize: 18, fontWeight: 700, color: "#fff", marginBottom: 16 }}>Dashboard</div>

          {todaysSchedule && (
            <Card style={{ border: todaysSchedule.isRest ? "1px solid #333" : "1px solid #22c55e33", background: todaysSchedule.isRest ? "#141414" : "linear-gradient(135deg, rgba(34,197,94,0.08), rgba(34,197,94,0.02))" }}>
              <div style={{ fontSize: 11, color: "#888", textTransform: "uppercase", letterSpacing: 1, marginBottom: 6 }}>
                {alreadyTrainedToday ? "Completed Today" : "Today's Workout"}
              </div>
              {todaysSchedule.isRest ? (
                <div>
                  <div style={{ fontSize: 22, fontWeight: 700, color: "#888" }}>Rest Day</div>
                  <div style={{ fontSize: 13, color: "#666", marginTop: 4 }}>Recovery is where the gains happen. Stay hydrated and stretch.</div>
                </div>
              ) : (
                <div>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                    <div>
                      <div style={{ fontSize: 22, fontWeight: 700, color: "#fff" }}>{todaysSchedule.dayName}</div>
                      <div style={{ fontSize: 13, color: "#888", marginTop: 2 }}>{todaysSchedule.exercises?.length || 0} exercises</div>
                    </div>
                    {!alreadyTrainedToday && (
                      <button onClick={onStartWorkout} style={{
                        background: "linear-gradient(135deg, #22c55e, #16a34a)", color: "#fff", border: "none",
                        padding: "10px 20px", borderRadius: 8, fontSize: 14, fontWeight: 600, cursor: "pointer",
                        minHeight: 44, display: "flex", alignItems: "center", gap: 6, touchAction: "manipulation",
                      }}>
                        <Icon name="play" size={16} color="#fff" />
                        Let's Go
                      </button>
                    )}
                    {alreadyTrainedToday && (
                      <div style={{ background: "rgba(34,197,94,0.15)", padding: "8px 14px", borderRadius: 8 }}>
                        <Icon name="check" size={20} color="#22c55e" />
                      </div>
                    )}
                  </div>
                </div>
              )}
              {schedule?.type === "weekly" && (
                <div style={{ display: "flex", gap: 4, marginTop: 12, paddingTop: 12, borderTop: "1px solid #222" }}>
                  {DAY_NAMES_SHORT.map((d, i) => {
                    const isToday = new Date().getDay() === i;
                    const dayVal = schedule.mapping[i];
                    const isRest = !dayVal || dayVal === "Rest";
                    return (
                      <div key={i} style={{
                        flex: 1, textAlign: "center", padding: "4px 2px", borderRadius: 6,
                        background: isToday ? "rgba(34,197,94,0.2)" : "transparent",
                        border: isToday ? "1px solid #22c55e44" : "1px solid transparent",
                      }}>
                        <div style={{ fontSize: 9, color: isToday ? "#22c55e" : "#666", fontWeight: isToday ? 700 : 400 }}>{d}</div>
                        <div style={{ fontSize: 8, color: isRest ? "#444" : (isToday ? "#22c55e" : "#888"), marginTop: 2, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>
                          {isRest ? "Rest" : dayVal}
                        </div>
                      </div>
                    );
                  })}
                </div>
              )}
              {schedule?.type === "sequential" && (
                <div style={{ fontSize: 11, color: "#666", marginTop: 8, paddingTop: 8, borderTop: "1px solid #222" }}>
                  Sequential mode — next workout in rotation

            </Card>
          )}

          <Card>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
              <div>
                <div style={{ fontSize: 12, color: "#888", textTransform: "uppercase" }}>This Week</div>
                <div style={{ fontSize: 24, fontWeight: 700, color: "#fff" }}>{workoutsThisWeek}</div>
              </div>
              <button

                style={{
                  background: "linear-gradient(135deg, #22c55e, #16a34a)", color: "#fff", border: "none",
                  padding: "10px 20px", borderRadius: 8, fontSize: 14, fontWeight: 600, cursor: "pointer",
                  minHeight: 44, display: "flex", alignItems: "center", gap: 6, touchAction: "manipulation",
                }}
              >
                <Icon name="play" size={16} color="#fff" />
                Start
              </button>
            </div>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8 }}>
              {Object.entries(weeklyVolume).slice(0, 6).map(([muscle, sets]) => {
                const lm = VOLUME_LANDMARKS[muscle];
                const target = mesoSetTargets[muscle]?.[mesocycle?.currentWeek || 1] || lm.mav;
                return (
                  <div key={muscle} style={{ fontSize: 11 }}>
                    <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 4 }}>
                      <span style={{ textTransform: "capitalize", color: "#ccc" }}>{muscle}</span>
                      <span style={{ color: "#888" }}>{sets}/{target}</span>

                    <div style={{ background: "#0f0f0f", height: 4, borderRadius: 2, overflow: "hidden" }}>

                          width: `${Math.min((sets / target) * 100, 100)}%`,

          <Card>
            <div style={{ fontSize: 14, fontWeight: 600, color: "#fff", marginBottom: 12 }}>Fatigue Status</div>
            <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 12 }}>
              <div style={{ width: 60, height: 60, borderRadius: "50%", background: `rgba(${fatigueData.overall > 70 ? "239, 68, 68" : fatigueData.overall > 50 ? "245, 158, 11" : "16, 185, 129"}, 0.2)`, display: "flex", alignItems: "center", justifyContent: "center" }}>
                <div style={{ fontSize: 22, fontWeight: 700, color: fatigueData.overall > 70 ? "#ef4444" : fatigueData.overall > 50 ? "#f59e0b" : "#10b981" }}>
                  {fatigueData.overall}
